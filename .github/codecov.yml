# Codecov configuration for community-modules
# Validate: curl -X POST --data-binary @.github/codecov.yml https://codecov.io/validate

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

ignore:
  - "**/testdata/**"
  - "**/*_test.go"
  - "**/*.gen.go"

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:
    - component_id: observability_logs_openobserve
      name: observability-logs-openobserve
      paths:
        - observability-logs-openobserve/**
    - component_id: observability_metrics_prometheus
      name: observability-metrics-prometheus
      paths:
        - observability-metrics-prometheus/**
    - component_id: observability_logs_aws_cloudwatch
      name: observability-logs-aws-cloudwatch
      paths:
        - observability-logs-aws-cloudwatch/**
    - component_id: observability_logs_gcp_cloudlogging
      name: observability-logs-gcp-cloudlogging
      paths:
        - observability-logs-gcp-cloudlogging/**
    - component_id: observability_metrics_aws_cloudwatch
      name: observability-metrics-aws-cloudwatch
      paths:
        - observability-metrics-aws-cloudwatch/**
    - component_id: observability_tracing_aws_xray
      name: observability-tracing-aws-xray
      paths:
        - observability-tracing-aws-xray/**
    - component_id: observability_tracing_openobserve
      name: observability-tracing-openobserve
      paths:
        - observability-tracing-openobserve/**
    - component_id: observability_events_otel_collector
      name: observability-events-otel-collector
      paths:
        - observability-events-otel-collector/**
