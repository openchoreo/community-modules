{{- if .Values.installDefaultPolicies }}
# Default SandboxTemplate for agent workloads (extensions.agents.x-k8s.io/v1alpha1).
#
# This template defines isolation tiers for the three standard OpenChoreo runtime classes.
# Per-component SandboxTemplates (named "agent-<component>") are created by the controller
# at runtime and encode the actual container image.  These global defaults are used by
# the SandboxWarmPool to keep pre-warmed sandboxes ready for fast claiming.
---
# runc tier — default Linux container isolation, no runtimeClassName override.
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: openchoreo-agent-runc
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-sandbox-controller
    agent.openchoreo.dev/isolation-tier: runc
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    openchoreo.dev/description: |
      Default isolation using runc (standard Linux namespaces + cgroups).
      No extra node requirement.
spec:
  podTemplate:
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: registry.k8s.io/pause:3.10  # lightweight placeholder; overridden per-component
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
---
{{- if has "gvisor" .Values.runtimeClasses }}
# gvisor tier — syscall interception via user-space kernel.
# Only created when "gvisor" is listed in .Values.runtimeClasses.
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: openchoreo-agent-enhanced
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-sandbox-controller
    agent.openchoreo.dev/isolation-tier: gvisor
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    openchoreo.dev/description: |
      Enhanced isolation using gVisor. Requires runtimeClassName "gvisor" on nodes.
spec:
  podTemplate:
    spec:
      runtimeClassName: gvisor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: registry.k8s.io/pause:3.10  # lightweight placeholder; overridden per-component
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
---
{{- end }}
{{- if has "kata" .Values.runtimeClasses }}
# kata tier — full VM isolation via Firecracker/QEMU.
# Only created when "kata" is listed in .Values.runtimeClasses.
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: openchoreo-agent-maximum
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-sandbox-controller
    agent.openchoreo.dev/isolation-tier: kata
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    openchoreo.dev/description: |
      Maximum isolation using Kata Containers. Requires runtimeClassName "kata" on nodes.
spec:
  podTemplate:
    spec:
      runtimeClassName: kata
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: registry.k8s.io/pause:3.10  # lightweight placeholder; overridden per-component
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
{{- end }}
{{- end }}
