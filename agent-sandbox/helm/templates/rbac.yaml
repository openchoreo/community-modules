apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-sandbox-module-controller
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-sandbox-module-controller
rules:
  # Read/update Components, their status, and finalizers
  - apiGroups: [openchoreo.dev]
    resources: [components]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [openchoreo.dev]
    resources: [components/status, components/finalizers]
    verbs: [get, update, patch]
  # Read ClusterComponentTypes, Workloads
  - apiGroups: [openchoreo.dev]
    resources: [clustercomponenttypes, workloads]
    verbs: [get, list, watch]
  # Read Project and DeploymentPipeline for environment resolution
  - apiGroups: [openchoreo.dev]
    resources: [projects, deploymentpipelines]
    verbs: [get, list, watch]
  # Create/update RenderedRelease — the renderedrelease controller applies
  # the sandbox resources to the data plane via cluster-gateway.
  - apiGroups: [openchoreo.dev]
    resources: [renderedreleases]
    verbs: [get, list, watch, create, update, patch, delete]
  # Read SandboxPolicy for network policy generation
  - apiGroups: [agent.openchoreo.dev]
    resources: [sandboxpolicies, sandboxpolicies/status]
    verbs: [get, list, watch, create, update, patch, delete]
  # Create/update NetworkPolicy for egress enforcement
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-sandbox-module-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-sandbox-module-controller
subjects:
  - kind: ServiceAccount
    name: agent-sandbox-module-controller
    namespace: {{ .Values.namespace }}
