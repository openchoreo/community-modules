{{- if .Values.upstream.install }}
# Job that installs the upstream kubernetes-sigs/agent-sandbox controller before the
# agent-sandbox module controller is deployed. Runs as a Helm pre-install/pre-upgrade hook.
#
# The job fetches the upstream manifest.yaml from GitHub releases and applies it
# server-side using kubectl. The upstream controller manages the agents.x-k8s.io API group
# (SandboxTemplate, SandboxClaim, SandboxWarmPool) which provides pre-warmed sandbox pools.
{{- $manifestURL := .Values.upstream.manifestURL }}
{{- if eq $manifestURL "" }}
  {{- $manifestURL = printf "https://github.com/kubernetes-sigs/agent-sandbox/releases/download/%s/manifest.yaml" .Values.upstream.version }}
{{- end }}
{{- $extensionsURL := printf "https://github.com/kubernetes-sigs/agent-sandbox/releases/download/%s/extensions.yaml" .Values.upstream.version }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-sandbox-upstream-installer
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-sandbox-upstream-installer
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  # The upstream manifest creates CRDs, RBAC, ServiceAccounts, Deployment, and Services.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "escalate", "bind"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "namespaces", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["agents.x-k8s.io", "extensions.agents.x-k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  # The upstream controller's ClusterRole needs these — the installer must hold
  # them too to avoid RBAC escalation denial when creating that ClusterRole.
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-sandbox-upstream-installer
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-sandbox-upstream-installer
subjects:
  - kind: ServiceAccount
    name: agent-sandbox-upstream-installer
    namespace: {{ .Values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: agent-sandbox-upstream-install
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: agent-sandbox-upstream-installer
      restartPolicy: Never
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Installing kubernetes-sigs/agent-sandbox {{ .Values.upstream.version }}..."
              echo "Applying core manifest..."
              kubectl apply --server-side -f {{ $manifestURL | quote }}
              echo "Applying extensions manifest..."
              kubectl apply --server-side -f {{ $extensionsURL | quote }}
              echo "Upstream controller installed successfully."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
{{- end }}
