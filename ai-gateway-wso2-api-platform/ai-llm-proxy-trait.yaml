# ClusterTrait: ai-llm-proxy
#
# LLM passthrough proxy trait for the WSO2 API Platform AI gateway. Attach it to
# any in-cluster component (an AI agent or service) that calls an LLM. The trait
# exposes a per-component LLM endpoint (an LlmProxy) that fronts a shared,
# platform-managed LlmProvider and forwards requests to the upstream as-is.
#
# Difference from `ai-model-routing`:
#   - ai-llm-proxy   (this trait): PASSTHROUGH. The client chooses the model via
#                    the request `model` field; the gateway forwards it unchanged
#                    to the provider's upstream. The client can request any model
#                    the provider's upstream serves (e.g. any OpenAI model). No
#                    routing/load-balancing policy is applied.
#   - ai-model-routing: DISTRIBUTION. The gateway overwrites the client's `model`
#                    and distributes requests across a fixed set of models
#                    (round-robin / weighted). The client cannot pick the model.
#
# Use ai-llm-proxy when the application decides which model to call. Use
# ai-model-routing when the platform decides (load balancing across models).
# A component should use one or the other for a given endpoint, not both.
#
# Like ai-model-routing, traffic is east-west: the component calls the WSO2
# gateway-runtime Service directly inside the cluster. The trait does NOT create
# a kgateway Backend or patch an HTTPRoute — there is no public ingress. It only:
#   - Creates a WSO2 LlmProxy (context only; no policies)
#   - Injects OPENAI_BASE_URL (and OPENAI_API_KEY) into the component Deployment
#
# The component talks to OPENAI_BASE_URL using the standard OpenAI SDK; the
# gateway forwards through the shared provider to the upstream with the
# platform-managed credential. Allowed paths/methods are governed by the shared
# LlmProvider's accessControl (e.g. /v1/chat/completions).
#
# Prerequisites:
#   - WSO2 API Platform gateway installed in the data plane (see README.md).
#   - A shared LlmProvider deployed once (its name is `providerRef`), holding the
#     upstream URL + credential (see README.md install step).
#   - The APIGateway uses `apiSelector.scope: Cluster` so LLM resources in any
#     namespace are picked up automatically (no target label required).
#   - The cluster-agent has RBAC for `gateway.api-platform.wso2.com` llmproxies
#     (see README.md Step 4).
#   - "ai-llm-proxy" is listed in the ComponentType's allowedTraits.
#
---
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterTrait
metadata:
  name: ai-llm-proxy
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        # --- Gateway runtime reference (in-cluster Service the agent calls) ---
        gatewayRuntimeName:
          type: string
          default: "api-platform-default-gateway-gateway-runtime"
          description: "Name of the WSO2 API Platform gateway-runtime Service in the data plane"
        gatewayRuntimeNamespace:
          type: string
          default: "openchoreo-data-plane"
          description: "Namespace of the WSO2 API Platform gateway-runtime Service"
        gatewayRuntimePort:
          type: integer
          default: 8080
          description: "HTTP listener port of the gateway-runtime Service"

        # --- Shared LLM provider (created once at install time) ---
        providerRef:
          type: string
          default: "openai-provider"
          description: "Name (id) of the platform-managed LlmProvider this proxy fronts"

  validations:
    - rule: "${size(parameters.providerRef) > 0}"
      message: "providerRef must reference a deployed LlmProvider (e.g. openai-provider)"

  creates:
    # ==================================================================
    #  LlmProxy — per-component passthrough endpoint fronting the provider.
    #  No policies: the request (including the client's `model`) is forwarded
    #  unchanged to the provider's upstream. context is derived per
    #  component+environment so it is unique across the cluster-scoped gateway;
    #  the injected OPENAI_BASE_URL points at it.
    # ==================================================================
    - targetPlane: dataplane
      template:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: LlmProxy
        metadata:
          name: ${metadata.name}-${trait.instanceName}-llm
          namespace: ${metadata.namespace}
        spec:
          displayName: ${metadata.environmentName}-${metadata.componentName}-${trait.instanceName}
          version: v1.0
          context: /${metadata.environmentName}-${metadata.componentNamespace}-${metadata.componentName}-${trait.instanceName}
          provider:
            id: ${parameters.providerRef}

  # ------------------------------------------------------------------
  #  Patches — inject the gateway endpoint into the component Deployment.
  #  The agent uses the standard OpenAI SDK against OPENAI_BASE_URL and picks the
  #  model itself; the gateway forwards it unchanged to the upstream.
  # ------------------------------------------------------------------
  patches:
    - target:
        group: apps
        version: v1
        kind: Deployment
      operations:
        # OPENAI_BASE_URL — the LlmProxy context on the in-cluster gateway.
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: OPENAI_BASE_URL
            value: "http://${parameters.gatewayRuntimeName}.${parameters.gatewayRuntimeNamespace}:${parameters.gatewayRuntimePort}/${metadata.environmentName}-${metadata.componentNamespace}-${metadata.componentName}-${trait.instanceName}"
        # OPENAI_API_KEY — placeholder so OpenAI SDKs initialize. The real
        # upstream credential lives on the shared LlmProvider at the gateway.
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: OPENAI_API_KEY
            value: "managed-by-gateway"

---
