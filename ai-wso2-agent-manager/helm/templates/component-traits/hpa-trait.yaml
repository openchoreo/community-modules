apiVersion: openchoreo.dev/v1alpha1
kind: ClusterTrait
metadata:
  name: horizontal-pod-autoscaler
spec:
  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
          description: "Enable horizontal pod autoscaling"
        minReplicas:
          type: integer
          default: 2
          minimum: 1
          description: "Minimum number of replicas"
        maxReplicas:
          type: integer
          default: 5
          minimum: 1
          description: "Maximum number of replicas"
        targetCPUUtilizationPercentage:
          type: integer
          default: 80
          minimum: 1
          maximum: 100
          description: "Target CPU utilization percentage"

  creates:
    - includeWhen: ${environmentConfigs.enabled}
      template:
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: ${metadata.name}
          minReplicas: ${environmentConfigs.minReplicas}
          maxReplicas: ${environmentConfigs.maxReplicas}
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: ${environmentConfigs.targetCPUUtilizationPercentage}
