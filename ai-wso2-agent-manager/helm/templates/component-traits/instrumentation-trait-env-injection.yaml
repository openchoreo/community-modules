apiVersion: openchoreo.dev/v1alpha1
kind: ClusterTrait
metadata:
  name: instrumentation-trait-env-injection
  annotations:
    openchoreo.dev/description: "Trait to inject OpenTelemetry and agent API key environment variables into containers"
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        otelEndpoint:
          type: string
          description: "OpenTelemetry collector endpoint URL"
        agentApiKey:
          type: string
          description: "API key for authenticating with the agent service"
      required:
        - otelEndpoint
        - agentApiKey

  creates:
    - template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${metadata.name}-agent-api-key
          namespace: ${metadata.namespace}
        type: Opaque
        stringData:
          api-key: ${parameters.agentApiKey}

  patches:
    - target:
        kind: Deployment
        group: apps
        version: v1
      operations:
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: AMP_OTEL_ENDPOINT
            value: "${parameters.otelEndpoint}"
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: AMP_AGENT_API_KEY
            valueFrom:
              secretKeyRef:
                name: ${metadata.name}-agent-api-key
                key: api-key
