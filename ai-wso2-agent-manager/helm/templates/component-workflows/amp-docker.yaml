apiVersion: openchoreo.dev/v1alpha1
kind: ClusterWorkflow
metadata:
  name: amp-docker
  labels:
    openchoreo.dev/workflow-type: "component"
  annotations:
    openchoreo.dev/description: "Docker build workflow for containerized builds using Dockerfile"
spec:
  workflowPlaneRef:
    kind: ClusterWorkflowPlane
    name: default
  ttlAfterCompletion: "5d"
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - repository
      properties:
        repository:
          type: object
          description: "Git repository configuration"
          required:
            - url
          properties:
            url:
              type: string
              description: "Git repository URL"
              x-openchoreo-component-parameter-repository-url: true
            revision:
              type: object
              default: {}
              properties:
                branch:
                  type: string
                  default: main
                  description: "Git branch to checkout"
                  x-openchoreo-component-parameter-repository-branch: true
                commit:
                  type: string
                  default: ""
                  description: "Git commit SHA or reference (optional, defaults to latest)"
                  x-openchoreo-component-parameter-repository-commit: true
            appPath:
              type: string
              default: "."
              description: "Path to the application directory within the repository"
              x-openchoreo-component-parameter-repository-app-path: true
        dockerConfigs:
          type: object
          default: {}
          properties:
            dockerfilePath:
              type: string
              default: "./Dockerfile"
              description: "Path to the Dockerfile relative to the repository root"
        endpoints:
          type: array
          default: []
          description: "List of endpoints exposed"
          items:
            type: object
            properties:
              name:
                type: string
              port:
                type: integer
              type:
                type: string
                default: "HTTP"
              schemaType:
                type: string
                default: "REST"
              schemaFilePath:
                type: string
                default: ""
              schemaContent:
                type: string
                default: ""
        environmentVariables:
          type: array
          default: []
          description: "List of environment variables"
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              value:
                type: string
              valueFrom:
                type: object
                properties:
                  secretKeyRef:
                    type: object
                    properties:
                      name:
                        type: string
                      key:
                        type: string

  runTemplate:
    apiVersion: argoproj.io/v1alpha1
    kind: Workflow
    metadata:
      name: ${metadata.workflowRunName}
      namespace: ${metadata.namespace}
    spec:
      activeDeadlineSeconds: 3600
      arguments:
        parameters:
          - name: component-name
            value: ${metadata.labels['openchoreo.dev/component']}
          - name: project-name
            value: ${metadata.labels['openchoreo.dev/project']}
          - name: workflowrun-name
            value: ${metadata.workflowRunName}
          - name: namespace-name
            value: ${metadata.namespaceName}
          - name: git-repo
            value: ${parameters.repository.url}
          - name: branch
            value: ${parameters.repository.revision.branch}
          - name: commit
            value: ${parameters.repository.revision.commit}
          - name: app-path
            value: ${parameters.repository.appPath}
          - name: dockerfile-path
            value: ${parameters.dockerConfigs.dockerfilePath}
          - name: image-name
            value: ${metadata.workflowRunName}-image
          - name: image-tag
            value: v1
          - name: endpoints
            value: ${parameters.endpoints}
          - name: environment-variables
            value: ${parameters.environmentVariables}
          - name: registry-push-secret
            value: ${metadata.workflowRunName}-registry-push-secret
          - name: oauth-secret-name
            value: ${metadata.workflowRunName}-workload-publisher-oauth
      serviceAccountName: workflow-sa
      entrypoint: build-workflow
      templates:
        - name: build-workflow
          steps:
            - - name: checkout-source
                templateRef:
                  name: amp-checkout-source
                  clusterScope: true
                  template: checkout
            - - name: build-image
                templateRef:
                  name: amp-docker
                  clusterScope: true
                  template: build-image
                arguments:
                  parameters:
                    - name: git-revision
                      value: '{{ "{{" }}steps.checkout-source.outputs.parameters.git-revision{{ "}}" }}'
            - - name: publish-image
                templateRef:
                  name: amp-publish-image
                  clusterScope: true
                  template: publish-image
                arguments:
                  parameters:
                    - name: git-revision
                      value: '{{ "{{" }}steps.checkout-source.outputs.parameters.git-revision{{ "}}" }}'
            - - name: generate-workload-cr
                templateRef:
                  name: amp-generate-workload
                  clusterScope: true
                  template: generate-workload-cr
                arguments:
                  parameters:
                    - name: image
                      value: '{{ "{{" }}steps.publish-image.outputs.parameters.image{{ "}}" }}'
                    - name: run-name
                      value: '{{ "{{" }}workflow.parameters.workflowrun-name{{ "}}" }}'
                    - name: oauth-secret-name
                      value: '{{ "{{" }}workflow.parameters.oauth-secret-name{{ "}}" }}'
      volumeClaimTemplates:
        - metadata:
            name: workspace
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi
  resources:
    - id: registry-push-secret
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.workflowRunName}-registry-push-secret
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: default
            kind: ClusterSecretStore
          target:
            name: ${metadata.workflowRunName}-registry-push-secret
            creationPolicy: Owner
            template:
              type: kubernetes.io/dockerconfigjson
              data:
                .dockerconfigjson: "{{ .registrysecret | toString }}"
          data:
            - secretKey: registrysecret
              remoteRef:
                key: registry-push-secret
    - id: workload-publisher-oauth
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.workflowRunName}-workload-publisher-oauth
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: default
            kind: ClusterSecretStore
          target:
            name: ${metadata.workflowRunName}-workload-publisher-oauth
            creationPolicy: Owner
          data:
            - secretKey: workload-publisher-oauth
              remoteRef:
                key: workflow-plane-oauth-client-secret
                property: value
