# HTTPRoute to expose the Agent Manager API via the OpenChoreo Gateway.
#
# BEFORE APPLYING: set AMP_API_HOSTNAME to the hostname configured in DNS,
# e.g. amp-api.<base-domain>
#
#   AMP_API_HOSTNAME=amp-api.example.com
#   envsubst < resources/httproute-amp-api.yaml | kubectl apply -f -
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: amp-api
  namespace: wso2-amp
spec:
  parentRefs:
    - name: gateway-default
      namespace: openchoreo-control-plane
  hostnames:
    - "${AMP_API_HOSTNAME}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: amp-api
          port: 9000
