#
# Prerequisites:
#   1. The data plane advertises the KEDA backend:
#        kubectl annotate clusterdataplane default \
#          openchoreo.dev/keda-based-scaling-backend=keda --overwrite
#   2. The `worker` type allows the trait (componenttypes/worker.yaml applied — see README).
---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: batch-worker
  namespace: default
spec:
  owner:
    projectName: default
  componentType:
    kind: ClusterComponentType
    name: deployment/worker
  autoDeploy: true
  traits:
    - kind: ClusterTrait
      name: keda-based-scaling
      instanceName: keda-based-scaling
      parameters:
        enabled: true
        minReplicas: 0
        maxReplicas: 3
        cooldownPeriod: 30
        trigger:
          type: cron
          metadata:
            timezone: "Etc/UTC"
            start: "0 3 * * *"
            end: "0 4 * * *"
            desiredReplicas: "1"
---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: batch-worker-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: batch-worker
  container:
    image: "busybox:1.36"
    command:
      - /bin/sh
      - -c
      - "while true; do echo working; sleep 30; done"
---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: batch-worker-development
  namespace: default
spec:
  owner:
    projectName: default
    componentName: batch-worker
  environment: development
  componentTypeEnvironmentConfigs:
    resources:
      requests:
        cpu: "10m"
        memory: "16Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
