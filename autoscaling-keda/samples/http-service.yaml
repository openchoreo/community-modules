# Prerequisites:
#   1. The `service` type allows the trait (patched to allow keda-scaling, see README step 3).
---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: greeter
  namespace: default
spec:
  owner:
    projectName: default
  componentType:
    kind: ClusterComponentType
    name: deployment/service
  autoDeploy: true
  traits:
    - kind: ClusterTrait
      name: keda-scaling
      instanceName: keda-scaling
      parameters:
        minReplicas: 0
        maxReplicas: 5
        cooldownPeriod: 30
---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: greeter-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeter
  endpoints:
    http:
      type: HTTP
      port: 9090
      visibility: [external]
  container:
    image: "hashicorp/http-echo:1.0.0"
    args:
      - "-listen=0.0.0.0:9090"
      - "-text=Hello from OpenChoreo Autoscaling with KEDA!"
---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeter-development
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeter
  environment: development
  componentTypeEnvironmentConfigs:
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
