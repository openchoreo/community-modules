# Prerequisites:
#   1. The `web-application` type allows the trait (patched to allow keda-scaling, see README step 3).
---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: keda-webapp
  namespace: default
spec:
  owner:
    projectName: default
  componentType:
    kind: ClusterComponentType
    name: deployment/web-application
  autoDeploy: true
  traits:
    - kind: ClusterTrait
      name: keda-scaling
      instanceName: keda-scaling
      parameters:
        minReplicas: 0
        maxReplicas: 5
        cooldownPeriod: 30
---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: keda-webapp-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: keda-webapp
  endpoints:
    http:
      type: HTTP
      port: 80
      visibility: [external]
  container:
    image: "nginx:1.27-alpine"
---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: keda-webapp-development
  namespace: default
spec:
  owner:
    projectName: default
    componentName: keda-webapp
  environment: development
  componentTypeEnvironmentConfigs:
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
