{{- if .Values.adapter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: finops-adapter
  namespace: {{ .Release.Namespace }}
  labels:
    app: finops-opencost-adapter
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.adapter.port }}
    targetPort: {{ .Values.adapter.port }}
    protocol: TCP
    name: http
  selector:
    app: finops-opencost-adapter
{{- end }}
