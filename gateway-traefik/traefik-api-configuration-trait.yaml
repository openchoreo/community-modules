# Traefik API Configuration Trait for OpenChoreo
#
# This ClusterTrait enables Traefik API management features on HTTPRoutes:
#   - Rate Limiting: Configurable request rate limits via Traefik's RateLimit Middleware
#   - Security: API key / basic auth enforcement via Traefik's BasicAuth Middleware
#   - Headers: Add custom headers to upstream requests / downstream responses via Traefik's Headers Middleware
#
# Each feature is independently toggleable. The trait conditionally creates Traefik Middleware
# CRDs and attaches them to the HTTPRoute via Gateway API `ExtensionRef` filters.
#
# IMPORTANT: Middlewares are attached via `ExtensionRef` filters in the HTTPRoute spec, NOT via
# the `traefik.io/router.middlewares` annotation. That annotation is only read by Traefik's
# `kubernetesCRD` provider (IngressRoute); the `kubernetesgateway` provider that processes
# HTTPRoutes ignores it. See README.md "Why not the annotation?" for details.
#
# Prerequisites:
#   - Traefik v3 installed in the data plane (see README.md)
#   - Traefik CRDs available (Middleware)
#   - ComponentType must have HTTPRoute resources for the patch to target
#   - "traefik-api-configuration" must be listed in the ComponentType's allowedTraits
#
# Usage:
#   1. Add "traefik-api-configuration" to the ComponentType's allowedTraits
#   2. Reference it in the Component's traits with desired parameters (see component.yaml)
#   3. Optionally override the rate limit per environment via ReleaseBinding traitEnvironmentConfigs

---
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterTrait
metadata:
  name: traefik-api-configuration
spec:
  parameters:
    openAPIV3Schema:
      type: object
      $defs:
        # --- rate-limiting configuration ---
        RateLimitingConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: true
            # Burst size: max requests allowed above the average rate in a short window.
            burst:
              type: integer
              default: 200

        # --- security (BasicAuth) configuration ---
        # Credentials must be stored in a Kubernetes Secret (htpasswd format) BEFORE
        # enabling this feature. The Secret must have a "users" key containing one
        # "user:hash" entry per line, and must exist in the same namespace as the component.
        SecurityConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            # Name of an existing Kubernetes Secret containing htpasswd-formatted users.
            secretName:
              type: string
              default: ""

        # --- header injection configuration ---
        # Headers use "Header-Name:value" format.
        AddHeadersConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            # Headers added to upstream requests (Traefik customRequestHeaders).
            requestHeaders:
              type: array
              items:
                type: string
              default: []
            # Headers added to downstream responses (Traefik customResponseHeaders).
            responseHeaders:
              type: array
              items:
                type: string
              default: []

      properties:
        rateLimiting:
          $ref: "#/$defs/RateLimitingConfig"
          default: {}
        security:
          $ref: "#/$defs/SecurityConfig"
          default: {}
        addHeaders:
          $ref: "#/$defs/AddHeadersConfig"
          default: {}

  environmentConfigs:
    # Platform engineers can tune the rate limit per environment via ReleaseBinding
    # traitEnvironmentConfigs.<instanceName>.rateLimiting.average.
    openAPIV3Schema:
      type: object
      properties:
        rateLimiting:
          type: object
          default: {}
          properties:
            # Average requests allowed per period (the trait uses period "1m").
            average:
              type: integer
              default: 100

  creates:
    # --- Middleware: Rate Limiting (always created) ---
    # Always created regardless of rateLimiting.enabled, because trait patches cannot be
    # conditional and a null entry in the filters array fails HTTPRoute validation. By always
    # creating the Middleware and always adding its ExtensionRef filter, we avoid that problem.
    #
    # When rateLimiting.enabled=true:  spec.rateLimit is set (active rate limiting).
    # When rateLimiting.enabled=false: spec.inFlightReq amount=1000000 acts as a no-op.
    #   (An empty headers spec is rejected by Traefik, so inFlightReq is used as the no-op.)
    - template:
        apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: ${metadata.name}-${trait.instanceName}-rate-limiting
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          rateLimit: >-
            ${parameters.rateLimiting.enabled ?
              {"average": environmentConfigs.rateLimiting.average,
               "burst": parameters.rateLimiting.burst,
               "period": "1m"} :
              oc_omit()}
          inFlightReq: >-
            ${!parameters.rateLimiting.enabled ?
              {"amount": 1000000} :
              oc_omit()}

    # --- Middleware: Security (always created) ---
    # When security.enabled=true:  spec.basicAuth references the user-provided Secret.
    # When security.enabled=false: spec.inFlightReq amount=1000000 acts as a no-op.
    - template:
        apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: ${metadata.name}-${trait.instanceName}-security
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          basicAuth: >-
            ${parameters.security.enabled ?
              {"secret": parameters.security.secretName} :
              oc_omit()}
          inFlightReq: >-
            ${!parameters.security.enabled ?
              {"amount": 1000000} :
              oc_omit()}

    # --- Middleware: Add Headers (always created) ---
    # When addHeaders.enabled=true:  spec.headers sets customRequestHeaders/customResponseHeaders.
    # When addHeaders.enabled=false: spec.inFlightReq amount=1000000 acts as a no-op.
    - template:
        apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: ${metadata.name}-${trait.instanceName}-add-headers
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          headers: >-
            ${parameters.addHeaders.enabled ?
              {"customRequestHeaders": parameters.addHeaders.requestHeaders.transformMapEntry(i, h, {h.split(":")[0]: h.split(":")[1]}),
               "customResponseHeaders": parameters.addHeaders.responseHeaders.transformMapEntry(i, h, {h.split(":")[0]: h.split(":")[1]})} :
              oc_omit()}
          inFlightReq: >-
            ${!parameters.addHeaders.enabled ?
              {"amount": 1000000} :
              oc_omit()}

  patches:
    # Attach each Middleware to every HTTPRoute via an ExtensionRef filter.
    # ExtensionRef is the correct mechanism for the kubernetesgateway provider; the
    # traefik.io/router.middlewares annotation is NOT read by it and must not be used.
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: add
          path: /spec/rules/0/filters/-
          value:
            type: ExtensionRef
            extensionRef:
              group: traefik.io
              kind: Middleware
              name: ${metadata.name}-${trait.instanceName}-rate-limiting

    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: add
          path: /spec/rules/0/filters/-
          value:
            type: ExtensionRef
            extensionRef:
              group: traefik.io
              kind: Middleware
              name: ${metadata.name}-${trait.instanceName}-security

    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: add
          path: /spec/rules/0/filters/-
          value:
            type: ExtensionRef
            extensionRef:
              group: traefik.io
              kind: Middleware
              name: ${metadata.name}-${trait.instanceName}-add-headers

---
