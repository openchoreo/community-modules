# =============================================================================
# NOTES
# =============================================================================
#
# 1. Derived Values:
#    The trait automatically derives displayName, context, version, upstream URL,
#    and operations from the component metadata and workload endpoints.
#
# 2. Traffic Path:
#    Client → kgateway (TLS, hostname routing) → WSO2 Router (policies) → Service → Pod
#
# 3. Context Path Pattern:
#    /<environment>-<namespace>-<componentName>
#    Example: /development-default-greeting-service
#
# 4. Available Policies:
#    - jwtAuth:    JWT authentication (enabled: true)
#    - rateLimit:  Request rate limiting (enabled: true, limits: [...])
#    - addHeaders: Custom request/response headers (enabled: true, requestHeaders/responseHeaders: [...])
#    All policies are disabled by default. See component-without-trait.yaml for
#    an example without policies.