# =============================================================================
# USAGE EXAMPLE
# =============================================================================
#
# The following resources demonstrate how to use the api-management trait
# with the standard OpenChoreo service ComponentType. The ComponentType at
# samples/getting-started/component-types/service.yaml already includes
# "api-management" in its allowedTraits.

# --- Component: Using WSO2 API Platform for API management ---
---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: greeting-service
  namespace: default
spec:
  owner:
    projectName: default
  autoDeploy: true
  componentType:
    kind: ComponentType
    name: deployment/service

  traits:
    - name: api-management
      instanceName: greeter-api
      parameters:
        jwtAuth:
          enabled: true
        rateLimit:
          enabled: true
          limits:
            - requests: 5
              duration: "1m"
        addHeaders:
          enabled: true
          requestHeaders:
            - name: X-Gateway
              value: wso2-api-platform
          responseHeaders:
            - name: X-Powered-By
              value: OpenChoreo

---
# --- Workload ---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: greeting-service-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  endpoints:
    http:
      type: HTTP
      port: 9090
      visibility: [external]

  container:
    image: "ghcr.io/openchoreo/samples/greeter-service:latest"
    args:
      - --port
      - "9090"

---
# --- ReleaseBinding: Development environment ---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeting-service-development
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  environment: development

  componentTypeEnvOverrides:
    replicas: 1
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

---
# --- ReleaseBinding: Production environment ---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeting-service-production
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  environment: production

  componentTypeEnvOverrides:
    replicas: 3
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "2Gi"

