# WSO2 API Platform API Configuration Trait for OpenChoreo
#
# This trait enables WSO2 API Platform API management features on components:
#   - Creates a kgateway Backend pointing to the WSO2 API Platform router
#   - Creates a WSO2 RestApi resource defining the API (context, version, upstream, operations, policies)
#   - Patches the HTTPRoute backendRef to route traffic through the WSO2 router
#   - Patches the HTTPRoute URL rewrite to use the API context path
#
# Unlike other gateway modules (Kong, Traefik, Envoy Gateway), WSO2 API Platform does NOT
# implement the Kubernetes Gateway API. It runs alongside the default kgateway, which handles
# Gateway/HTTPRoute resources. Traffic is redirected through the WSO2 router via a kgateway
# Backend resource.
#
# Prerequisites:
#   - WSO2 API Platform enabled in the data plane (see README.md)
#   - WSO2 API Platform CRDs available (RestApi, Gateway)
#   - kgateway installed (default) with Backend CRD support
#   - ComponentType must have HTTPRoute resources for the patch to target
#   - "api-configuration" must be listed in the ComponentType's allowedTraits
#
# Usage:
#   1. Enable WSO2 API Platform in the data plane Helm chart (api-platform.enabled=true)
#   2. Add "api-configuration" to the ComponentType's allowedTraits
#   3. Reference it in the Component's traits with desired parameters
#
# See the end of this file for a complete usage example with Component, Workload,
# and ReleaseBinding.

---
apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: api-configuration
  namespace: default
spec:
  schema:
    types:
      # --- jwt-auth policy ---
      # Validates JWT access tokens in API requests.
      # System-level key manager configuration is set in the gateway-configuration ConfigMap.
      JwtAuthParameters:
        issuers: "array<string> | default=[]"
        audiences: "array<string> | default=[]"
        requiredScopes: "array<string> | default=[]"
        requiredClaims: "map<string> | default={}"
        claimMappings: "map<string> | default={}"
        authHeaderPrefix: "string | default=Bearer"
        userIdClaim: "string | default=sub"

      JwtAuthPolicy:
        name: "string | default=jwt-auth"
        version: "string | default=v0"
        params: "JwtAuthParameters | default={}"

      # --- basic-ratelimit policy ---
      # Restricts request rates using one or more time windows.
      # duration uses Go duration format (e.g., "1s", "1m", "1h", "24h").
      RateLimitEntry:
        requests: "integer"
        duration: "string"

      BasicRateLimitParameters:
        limits: "array<RateLimitEntry> | default=[]"

      BasicRateLimitPolicy:
        name: "string | default=basic-ratelimit"
        version: "string | default=v0"
        params: "BasicRateLimitParameters | default={}"

      # --- add-headers policy ---
      # Adds arbitrary headers to the request or response.
      HeaderEntry:
        name: "string"
        value: "string"

      AddHeadersParameters:
        requestHeaders: "array<HeaderEntry> | default=[]"
        responseHeaders: "array<HeaderEntry> | default=[]"

      AddHeadersPolicy:
        name: "string | default=add-headers"
        version: "string | default=v0"
        params: "AddHeadersParameters | default={}"

    parameters:
      apiName: "string"
      apiVersion: "string | default=v1.0"
      context: "string"
      upstreamPort: "integer | default=80"
      operations:
        'array<map<string>> | default=[{"method": "GET", "path": "/*"}, {"method": "POST", "path": "/*"}, {"method": "PUT", "path": "/*"}, {"method": "DELETE", "path": "/*"}, {"method": "PATCH", "path": "/*"}, {"method": "OPTIONS", "path": "/*"}]'
      jwtAuth: "JwtAuthPolicy | default={}"
      rateLimit: "BasicRateLimitPolicy | default={}"
      addHeaders: "AddHeadersPolicy | default={}"

  creates:
    # --- Backend: kgateway static backend pointing to WSO2 API Platform router ---
    # This Backend resource tells kgateway to forward traffic to the WSO2 API Platform
    # router instead of directly to the component's Service. The HTTPRoute's backendRef
    # is patched (below) to reference this Backend.
    - template:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: Backend
        metadata:
          name: ${metadata.componentName}-api-gw-backend
          namespace: ${metadata.namespace}
        spec:
          type: Static
          static:
            hosts:
              - host: api-platform-default-gateway-gateway-runtime.openchoreo-data-plane
                port: 8080

    # --- RestApi: WSO2 API Platform API definition ---
    # This resource defines the API in WSO2 API Platform. The operator reconciles it
    # into the WSO2 router's configuration, enabling policy enforcement (rate limiting,
    # auth, etc.) on traffic matching the context path.
    #
    # The upstream.main.url points to the component's Kubernetes Service, which is where
    # the WSO2 router forwards traffic after applying policies.
    - template:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: RestApi
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
        spec:
          displayName: ${parameters.apiName}
          version: ${parameters.apiVersion}
          context: ${parameters.context}
          upstream:
            main:
              url: http://${metadata.componentName}.${metadata.namespace}:${parameters.upstreamPort}
          policies:
            - ${parameters.jwtAuth}
            - ${parameters.rateLimit}
            - ${parameters.addHeaders}
          operations: ${parameters.operations}

  patches:
    # --- Patch HTTPRoute: Replace backendRef with WSO2 router Backend ---
    # Replaces the component's Service in the HTTPRoute backendRef with the kgateway
    # Backend pointing to the WSO2 API Platform router. This redirects all traffic
    # through the WSO2 router for policy enforcement before reaching the upstream service.
    #
    # The selector matches the backendRef by the component's Service name, ensuring
    # only the correct backendRef is replaced (not other refs in multi-backend routes).
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: replace
          path: /spec/rules/0/backendRefs/[?(@.name=='${metadata.componentName}')]
          value:
            group: gateway.kgateway.dev
            kind: Backend
            name: ${metadata.componentName}-api-gw-backend

    # --- Patch HTTPRoute: Update URL rewrite to API context path ---
    # Updates the URLRewrite filter's replacePrefixMatch to the API's context path.
    # This ensures the WSO2 router receives the correct path prefix to match the
    # RestApi's context configuration.
        - op: replace
          path: /spec/rules/0/filters/0/urlRewrite/path
          value:
            type: ReplacePrefixMatch
            replacePrefixMatch: ${parameters.context}

---
