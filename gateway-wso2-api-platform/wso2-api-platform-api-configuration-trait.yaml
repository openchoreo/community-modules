# WSO2 API Platform API Configuration Trait for OpenChoreo
#
# This trait enables WSO2 API Platform API management features on components:
#   - Creates a kgateway Backend pointing to the WSO2 API Platform router
#   - Creates a WSO2 RestApi resource defining the API (context, version, upstream, operations, policies)
#   - Patches the HTTPRoute backendRef to route traffic through the WSO2 router
#   - Patches the HTTPRoute URL rewrite to use the API context path
#
# Unlike other gateway modules (Kong, Traefik, Envoy Gateway), WSO2 API Platform does NOT
# implement the Kubernetes Gateway API. It runs alongside the default kgateway, which handles
# Gateway/HTTPRoute resources. Traffic is redirected through the WSO2 router via a kgateway
# Backend resource.
#
# Prerequisites:
#   - WSO2 API Platform enabled in the data plane (see README.md)
#   - WSO2 API Platform CRDs available (RestApi, Gateway)
#   - kgateway installed (default) with Backend CRD support
#   - ComponentType must have HTTPRoute resources for the patch to target
#   - "api-configuration" must be listed in the ComponentType's allowedTraits
#
# Usage:
#   1. Enable WSO2 API Platform in the data plane Helm chart (api-platform.enabled=true)
#   2. Add "api-configuration" to the ComponentType's allowedTraits
#   3. Reference it in the Component's traits with desired parameters
#
# See the end of this file for a complete usage example with Component, Workload,
# and ReleaseBinding.

---
apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: api-configuration
  namespace: default
spec:
  schema:
    types:
      # --- jwt-auth policy ---
      # Validates JWT access tokens in API requests.
      # System-level key manager configuration is set in the gateway-configuration ConfigMap.
      JwtAuthParameters:
        issuers: "array<string> | default=[]"
        audiences: "array<string> | default=[]"
        requiredScopes: "array<string> | default=[]"
        requiredClaims: "map<string> | default={}"
        claimMappings: "map<string> | default={}"
        authHeaderPrefix: "string | default=Bearer"
        userIdClaim: "string | default=sub"

      JwtAuthPolicy:
        name: "string | default=jwt-auth"
        version: "string | default=v0"
        params: "JwtAuthParameters | default={}"

      # --- basic-ratelimit policy ---
      # Restricts request rates using one or more time windows.
      # duration uses Go duration format (e.g., "1s", "1m", "1h", "24h").
      RateLimitEntry:
        requests: "integer"
        duration: "string"

      BasicRateLimitParameters:
        limits: "array<RateLimitEntry> | default=[]"

      BasicRateLimitPolicy:
        name: "string | default=basic-ratelimit"
        version: "string | default=v0"
        params: "BasicRateLimitParameters | default={}"

      # --- add-headers policy ---
      # Adds arbitrary headers to the request or response.
      HeaderEntry:
        name: "string"
        value: "string"

      AddHeadersParameters:
        requestHeaders: "array<HeaderEntry> | default=[]"
        responseHeaders: "array<HeaderEntry> | default=[]"

      AddHeadersPolicy:
        name: "string | default=add-headers"
        version: "string | default=v0"
        params: "AddHeadersParameters | default={}"

    parameters:
      apiName: "string"
      apiVersion: "string | default=v1.0"
      context: "string"
      upstreamPort: "integer | default=80"
      operations:
        'array<map<string>> | default=[{"method": "GET", "path": "/*"}, {"method": "POST", "path": "/*"}, {"method": "PUT", "path": "/*"}, {"method": "DELETE", "path": "/*"}, {"method": "PATCH", "path": "/*"}, {"method": "OPTIONS", "path": "/*"}]'
      jwtAuth: "JwtAuthPolicy | default={}"
      rateLimit: "BasicRateLimitPolicy | default={}"
      addHeaders: "AddHeadersPolicy | default={}"

  creates:
    # --- Backend: kgateway static backend pointing to WSO2 API Platform router ---
    # This Backend resource tells kgateway to forward traffic to the WSO2 API Platform
    # router instead of directly to the component's Service. The HTTPRoute's backendRef
    # is patched (below) to reference this Backend.
    - template:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: Backend
        metadata:
          name: ${metadata.componentName}-api-gw-backend
          namespace: ${metadata.namespace}
        spec:
          type: Static
          static:
            hosts:
              - host: api-platform-default-gateway-gateway-runtime.openchoreo-data-plane
                port: 8080

    # --- RestApi: WSO2 API Platform API definition ---
    # This resource defines the API in WSO2 API Platform. The operator reconciles it
    # into the WSO2 router's configuration, enabling policy enforcement (rate limiting,
    # auth, etc.) on traffic matching the context path.
    #
    # The upstream.main.url points to the component's Kubernetes Service, which is where
    # the WSO2 router forwards traffic after applying policies.
    - template:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: RestApi
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
        spec:
          displayName: ${parameters.apiName}
          version: ${parameters.apiVersion}
          context: ${parameters.context}
          upstream:
            main:
              url: http://${metadata.componentName}.${metadata.namespace}:${parameters.upstreamPort}
          policies:
            - ${parameters.jwtAuth}
            - ${parameters.rateLimit}
            - ${parameters.addHeaders}
          operations: ${parameters.operations}

  patches:
    # --- Patch HTTPRoute: Replace backendRef with WSO2 router Backend ---
    # Replaces the component's Service in the HTTPRoute backendRef with the kgateway
    # Backend pointing to the WSO2 API Platform router. This redirects all traffic
    # through the WSO2 router for policy enforcement before reaching the upstream service.
    #
    # The selector matches the backendRef by the component's Service name, ensuring
    # only the correct backendRef is replaced (not other refs in multi-backend routes).
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: replace
          path: /spec/rules/0/backendRefs/[?(@.name=='${metadata.componentName}')]
          value:
            group: gateway.kgateway.dev
            kind: Backend
            name: ${metadata.componentName}-api-gw-backend

    # --- Patch HTTPRoute: Update URL rewrite to API context path ---
    # Updates the URLRewrite filter's replacePrefixMatch to the API's context path.
    # This ensures the WSO2 router receives the correct path prefix to match the
    # RestApi's context configuration.
        - op: replace
          path: /spec/rules/0/filters/0/urlRewrite/path
          value:
            type: ReplacePrefixMatch
            replacePrefixMatch: ${parameters.context}

---
# =============================================================================
# USAGE EXAMPLE
# =============================================================================
#
# The following resources demonstrate how to use the api-configuration trait
# with the standard OpenChoreo service ComponentType. The ComponentType at
# samples/getting-started/component-types/service.yaml already includes
# "api-configuration" in its allowedTraits.

# --- Component: Using WSO2 API Platform for API management ---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: greeting-service
  namespace: default
spec:
  owner:
    projectName: default
  autoDeploy: true
  componentType:
    kind: ComponentType
    name: deployment/service

  traits:
    - name: api-configuration
      instanceName: greeter-api
      parameters:
        apiName: Greeter Service API
        apiVersion: v1.0
        context: /greeter
        upstreamPort: 9090
        operations:
          - method: GET
            path: "/*"
          - method: POST
            path: "/*"
        jwtAuth: {}
        rateLimit:
          params:
            limits:
              - requests: 5
                duration: "1m"
        addHeaders:
          params:
            requestHeaders:
              - name: X-Gateway
                value: wso2-api-platform
            responseHeaders:
              - name: X-Powered-By
                value: wso2-api-platform

---
# --- Workload ---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: greeting-service-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  endpoints:
    http:
      type: HTTP
      port: 9090
      visibility: [external]

  container:
    image: "ghcr.io/openchoreo/samples/greeter-service:latest"
    args:
      - --port
      - "9090"

---
# --- ReleaseBinding: Development environment ---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeting-service-development
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  environment: development

  componentTypeEnvOverrides:
    replicas: 1
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

---
# --- ReleaseBinding: Production environment ---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeting-service-production
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  environment: production

  componentTypeEnvOverrides:
    replicas: 3
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "2Gi"

# =============================================================================
# RENDERED OUTPUT (what gets applied to the data plane)
# =============================================================================
#
# With the api-configuration trait applied, the following resources are created
# or patched:
#
# 1. Backend: kgateway static backend → WSO2 router
#    ---
#    apiVersion: gateway.kgateway.dev/v1alpha1
#    kind: Backend
#    metadata:
#      name: greeting-service-api-gw-backend
#    spec:
#      type: Static
#      static:
#        hosts:
#          - host: api-platform-default-gateway-router.openchoreo-data-plane
#            port: 8080
#
# 2. RestApi: WSO2 API Platform API definition
#    ---
#    apiVersion: gateway.api-platform.wso2.com/v1alpha1
#    kind: RestApi
#    metadata:
#      name: <release-name>
#    spec:
#      displayName: Greeter Service API
#      version: v1.0
#      context: /greeter
#      upstream:
#        main:
#          url: http://greeting-service.<namespace>:9090
#      policies: []
#      operations:
#        - method: GET
#          path: "/*"
#        - method: POST
#          path: "/*"
#
# 3. Patched HTTPRoute (backendRef replaced, URL rewrite updated):
#    ---
#    apiVersion: gateway.networking.k8s.io/v1
#    kind: HTTPRoute
#    spec:
#      rules:
#        - filters:
#            - type: URLRewrite
#              urlRewrite:
#                path:
#                  type: ReplacePrefixMatch
#                  replacePrefixMatch: /greeter      # Updated to API context
#          backendRefs:
#            - group: gateway.kgateway.dev           # Replaced: was core/v1 Service
#              kind: Backend
#              name: greeting-service-api-gw-backend  # Points to WSO2 router
#
# =============================================================================
# NOTES
# =============================================================================
#
# 1. WSO2 API Platform Does Not Support Gateway API:
#    Unlike Kong, Traefik, and Envoy Gateway, WSO2 API Platform has its own CRDs
#    (RestApi, Gateway) and does not implement the Kubernetes Gateway API. This
#    module keeps kgateway as the Gateway API controller and routes traffic through
#    the WSO2 router via a kgateway Backend resource.
#
# 2. Traffic Path:
#    Client → kgateway (TLS, hostname routing) → WSO2 Router (policies) → Service → Pod
#    The WSO2 router applies API management policies before forwarding to the
#    upstream service. The RestApi's upstream.main.url points to the component's
#    Kubernetes Service directly.
#
# 3. WSO2 Policies:
#    Policies are defined in the RestApi's policies field. Common examples:
#
#    policies:
#      - policyName: basic-ratelimit
#        parameters:
#          limits:
#            - requests: 100
#              duration: "1m"
#      - policyName: cors
#        parameters:
#          accessControlAllowOrigins: "*"
#
#    Refer to https://github.com/wso2/gateway-controllers/tree/main/policies
#    for the full list of supported policies and their schemas.
#
# 4. Context Path:
#    The context parameter defines the API's base path in the WSO2 router. The trait
#    patches the HTTPRoute's URLRewrite filter to use this context path, ensuring
#    kgateway rewrites the request path before forwarding to the WSO2 router.
#    The WSO2 router then matches the context path to the RestApi and forwards
#    to the upstream service.
#
# 5. Multiple APIs per Component:
#    You can attach multiple api-configuration trait instances to a single component
#    for different endpoints, each with its own context path and policies:
#
#    traits:
#      - name: api-configuration
#        instanceName: public-api
#        parameters:
#          apiName: Public API
#          context: /public
#          upstreamPort: 8080
#          policies:
#            - policyName: basic-ratelimit
#              parameters:
#                limits:
#                  - requests: 100
#                    duration: "1m"
#      - name: api-configuration
#        instanceName: admin-api
#        parameters:
#          apiName: Admin API
#          context: /admin
#          upstreamPort: 8080
#          policies:
#            - policyName: basic-ratelimit
#              parameters:
#                limits:
#                  - requests: 10
#                    duration: "1m"
