# Syncs namespace definitions from the GitOps repository.
# Applied first — no dependencies.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: namespaces
  namespace: flux-system
spec:
  interval: 5m
  path: ./namespaces
  prune: true
  sourceRef:
    kind: GitRepository
    name: openchoreo-gitops
