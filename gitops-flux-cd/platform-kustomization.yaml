# Syncs namespace-scoped platform resources:
# Environment, DeploymentPipeline, ComponentType, Trait, Workflow,
# DataPlane, SecretReference, AuthzRole, AuthzRoleBinding, etc.
#
# Update the path and targetNamespace fields to match your setup.
# For multiple namespaces, duplicate this file with different names and paths.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 5m
  path: ./namespaces/default/platform
  prune: true
  targetNamespace: default
  sourceRef:
    kind: GitRepository
    name: openchoreo-gitops
  dependsOn:
    - name: namespaces
    - name: platform-shared
