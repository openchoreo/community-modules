# Syncs application resources:
# Project, Component, Workload, ComponentRelease, ReleaseBinding, etc.
#
# Update the path and targetNamespace fields to match your setup.
# For multiple namespaces, duplicate this file with different names and paths.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: projects
  namespace: flux-system
spec:
  interval: 5m
  path: ./namespaces/default/projects
  prune: true
  targetNamespace: default
  sourceRef:
    kind: GitRepository
    name: openchoreo-gitops
  dependsOn:
    - name: platform
