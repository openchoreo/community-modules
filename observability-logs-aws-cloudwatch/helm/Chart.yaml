apiVersion: v2
name: observability-logs-aws-cloudwatch
description: A Helm chart for OpenChoreo Logs Module for AWS CloudWatch Logs
type: application
# Version strategy: latest-dev for development, replaced by CI for releases
version: 0.0.0-latest-dev
appVersion: "latest-dev"
keywords:
  - cloudwatch
  - aws
  - openchoreo
  - logs
maintainers:
  - name: OpenChoreo Team
home: https://github.com/openchoreo/community-modules
dependencies:
  - name: amazon-cloudwatch-observability
    version: 6.3.0
    repository: https://aws-observability.github.io/helm-charts
    condition: cloudWatchAgent.enabled
