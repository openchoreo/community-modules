{{- if .Values.adapter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: logs-adapter-azure-loganalytics
  namespace: {{ .Release.Namespace }}
  labels:
    app: logs-adapter-azure-loganalytics
data:
  SERVER_PORT: {{ .Values.adapter.service.port | quote }}
  LOG_LEVEL: {{ .Values.adapter.logLevel | quote }}
  QUERY_TIMEOUT: {{ printf "%ds" (int .Values.adapter.queryTimeoutSeconds) | quote }}

  LOG_ANALYTICS_WORKSPACE_ID: {{ .Values.logAnalytics.workspaceId | quote }}
  WORKSPACE_RESOURCE_ID: {{ .Values.logAnalytics.workspaceResourceId | quote }}

  AZURE_SUBSCRIPTION_ID: {{ .Values.azure.subscriptionId | quote }}
  AZURE_RESOURCE_GROUP: {{ .Values.azure.resourceGroup | quote }}
  AZURE_REGION: {{ .Values.azure.region | quote }}

  ACTION_GROUP_ID: {{ .Values.actionGroup.id | quote }}
  OBSERVER_URL: {{ .Values.adapter.observerUrl | quote }}

  DEFAULT_EVALUATION_FREQUENCY: {{ .Values.adapter.alertRuleDefaults.evaluationFrequency | quote }}
  DEFAULT_WINDOW_SIZE: {{ .Values.adapter.alertRuleDefaults.windowSize | quote }}
{{- end }}
