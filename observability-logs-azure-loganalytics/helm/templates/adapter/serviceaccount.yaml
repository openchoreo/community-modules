{{- if .Values.adapter.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logs-adapter-azure-loganalytics
  namespace: {{ .Release.Namespace }}
  labels:
    app: logs-adapter-azure-loganalytics
  {{- with .Values.adapter.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /*
Required Azure role assignments when the adapter is installed as-is:

  Workspace scope (logAnalytics.workspaceResourceId):
    - Log Analytics Reader

  Resource group scope (azure.resourceGroup):
    - Monitoring Contributor  # create / update / delete scheduledQueryRules

  Action Group scope (actionGroup.id):
    - Reader                  # verifyActionGroup boot check

The identity is whichever DefaultAzureCredential picks up: on AKS this is
typically a User-Assigned Managed Identity federated to this ServiceAccount
via Workload Identity. Annotate the SA with `azure.workload.identity/client-id`
to bind it.
*/ -}}
{{- end }}
