{{- if and .Values.adapter.enabled .Values.adapter.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: logs-adapter-cloudwatch
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: logs-adapter-cloudwatch
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.adapter.service.port }}
      from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.adapter.networkPolicy.observerNamespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.adapter.networkPolicy.observerPodLabels | nindent 14 }}
        {{- if .Values.adapter.alerting.webhookIngress.enabled }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.adapter.networkPolicy.ingressNamespaceLabels | nindent 14 }}
        {{- end }}
        {{- if .Values.adapter.networkPolicy.allowProbeIPBlock }}
        - ipBlock:
            cidr: {{ .Values.adapter.networkPolicy.allowProbeIPBlock | quote }}
        {{- end }}
{{- end }}
