{{- if and .Values.adapter.enabled .Values.adapter.alerting.webhookAuth.enabled .Values.adapter.alerting.webhookAuth.sharedSecret (not .Values.adapter.alerting.webhookAuth.sharedSecretRef.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "logs-cloudwatch.webhookSecretName" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ .Values.adapter.alerting.webhookAuth.sharedSecretRef.key | default "token" }}: {{ .Values.adapter.alerting.webhookAuth.sharedSecret | quote }}
{{- end }}
