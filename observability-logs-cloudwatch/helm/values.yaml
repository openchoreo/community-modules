# Prefix shared by all log groups this module reads/writes.
# This is under `global` so the dependent amazon-cloudwatch-observability chart
# can render Fluent Bit with the same log group path as the adapter and setup
# Job. The application log group resolves to `<global.logGroupPrefix>/application`.
global:
  logGroupPrefix: "/aws/containerinsights"

# AWS authentication mode. Defaults to **EKS Pod Identity / IRSA / EC2
# instance-profile** — the AWS SDK default credentials chain picks them up
# automatically and no chart-managed Secret is needed.
#
# For k3d / kind / non-EKS targets, flip `create: true` and supply
# `accessKeyId` / `secretAccessKey`. The chart will create a Secret from
# those values and mount it on the adapter via envFrom; the
# `cloudWatchAgent.injectAwsCredentials` post-install hook (also off by
# default) must be re-enabled to patch the upstream Fluent Bit DaemonSet.
awsCredentials:
  create: false
  name: ""
  accessKeyId: ""
  secretAccessKey: ""

# Default retention applied to the log groups the setup Job creates.
# Must be one of CloudWatch's allowed values: 1, 3, 5, 7, 14, 30, 60, 90, 120,
# 150, 180, 365, 400, 545, 731, 1096, 1827, 2192, 2557, 2922, 3288, 3653.
containerLogs:
  retentionDays: 7

# ---------------------------------------------------------------------------
# amazon-cloudwatch-observability dependency
# ---------------------------------------------------------------------------
# The upstream chart installs the CloudWatch Agent + Fluent Bit DaemonSet. We
# run it in K8s mode so it works on non-EKS clusters (k3d / kind) as well as
# EKS. On EKS you may prefer `k8sMode: EKS` to pick up IRSA-based auth.
cloudWatchAgent:
  enabled: true
  # Optional compatibility bridge for the upstream Fluent Bit Pod Association
  # path, which expects `cloudwatch-agent.amazon-cloudwatch:4311`. This module
  # disables Pod Association in its Fluent Bit override, so the bridge is off
  # by default and no `amazon-cloudwatch` namespace is created.
  bridgeService:
    enabled: false
  # The upstream Fluent Bit DaemonSet exposes no env-injection knob, so static
  # AWS credentials (the k3d / kind path) cannot reach the cloudwatch_logs
  # output plugin. This Helm post-install hook Job patches the DaemonSet to
  # `envFrom` the same credentials Secret the adapter uses. Off by default
  # to match the EKS-first auth path; flip on (along with
  # `awsCredentials.create=true` and a non-empty `awsCredentials.name`) when
  # installing on k3d / kind with static keys.
  injectAwsCredentials:
    enabled: false
  # Image used by the post-install hook Job to apply the bridge Service and
  # patch the Fluent Bit DaemonSet. Any kubectl image works.
  hookImage:
    repository: alpine/k8s
    tag: "1.30.0"
    pullPolicy: IfNotPresent

amazon-cloudwatch-observability:
  # clusterName belongs to the upstream Container Insights chart. This module
  # does not use it for log group naming. The upstream chart requires a
  # non-empty value to render, so keep this stable across installs unless you
  # intentionally use upstream Container Insights features outside this module.
  clusterName: "openchoreo"
  # AWS region for the CloudWatch Agent and Fluent Bit output.
  region: ""
  containerLogs:
    enabled: true
    # Disable the dataplane (systemd: docker/containerd/kubelet) and host
    # (journal / kernel / dmesg) Fluent Bit inputs by default. Both require a
    # systemd journal at /var/log/journal, which k3d / kind nodes do not
    # provide — leaving the upstream defaults in place crashlloops the
    # DaemonSet on those targets. EKS users who want dataplane and host logs
    # can restore the upstream definitions by overriding these two keys with
    # the snippets shipped in the `amazon-cloudwatch-observability` chart.
    fluentBit:
      config:
        extraFiles:
          # Override the upstream application-log.conf to:
          #   1. Flip `Labels` to `On` in the kubernetes filter (the adapter
          #      scopes queries by openchoreo.dev/{component,environment,
          #      project}-uid pod labels — not emitted with upstream `Off`).
          #   2. Drop the `[FILTER] aws` block, set `Use_Pod_Association Off`,
          #      and `add_entity false`. All three rely on AWS Application
          #      Signals "entity" enrichment, which queries IMDS at
          #      169.254.169.254 and the cloudwatch-agent on :4311. On k3d /
          #      kind there is no IMDS endpoint and the agent has no AWS creds
          #      mounted, so each call wedges Fluent Bit on 10s timeouts and
          #      no logs ever reach CloudWatch. EKS users who want entity
          #      enrichment can restore the upstream defaults by overriding
          #      this key with the v4.10.3 snippet.
          # Everything else here is verbatim from amazon-cloudwatch-
          # observability v4.10.3; refresh on subchart bumps.
          application-log.conf: |
            [INPUT]
              Name                tail
              Tag                 application.*
              Exclude_Path        /var/log/containers/cloudwatch-agent*, /var/log/containers/fluent-bit*, /var/log/containers/aws-node*, /var/log/containers/kube-proxy*
              Path                /var/log/containers/*.log
              multiline.parser    docker, cri
              DB                  /var/fluent-bit/state/flb_container.db
              Mem_Buf_Limit       50MB
              Skip_Long_Lines     On
              Refresh_Interval    10
              Rotate_Wait         30
              storage.type        filesystem
              Read_from_Head      ${READ_FROM_HEAD}

            [INPUT]
              Name                tail
              Tag                 application.*
              Path                /var/log/containers/fluent-bit*
              multiline.parser    docker, cri
              DB                  /var/fluent-bit/state/flb_log.db
              Mem_Buf_Limit       5MB
              Skip_Long_Lines     On
              Refresh_Interval    10
              Read_from_Head      ${READ_FROM_HEAD}

            [INPUT]
              Name                tail
              Tag                 application.*
              Path                /var/log/containers/cloudwatch-agent*
              multiline.parser    docker, cri
              DB                  /var/fluent-bit/state/flb_cwagent.db
              Mem_Buf_Limit       5MB
              Skip_Long_Lines     On
              Refresh_Interval    10
              Read_from_Head      ${READ_FROM_HEAD}

            [FILTER]
              Name                kubernetes
              Match               application.*
              Kube_URL            https://kubernetes.default.svc:443
              Kube_Tag_Prefix     application.var.log.containers.
              Merge_Log           On
              Merge_Log_Key       log_processed
              K8S-Logging.Parser  On
              K8S-Logging.Exclude Off
              Labels              On
              Annotations         Off
              Use_Kubelet         On
              Kubelet_Port        10250
              Buffer_Size         0
              Use_Pod_Association Off

            [OUTPUT]
              Name                cloudwatch_logs
              Match               application.*
              region              ${AWS_REGION}
              log_group_name      {{ .Values.global.logGroupPrefix | default "/aws/containerinsights" | trimSuffix "/" }}/application
              log_stream_prefix   ${HOST_NAME}-
              auto_create_group   true
              extra_user_agent    container-insights
              add_entity          false
          dataplane-log.conf: |
            # Disabled by observability-logs-cloudwatch (k3d / kind have no systemd journal).
          host-log.conf: |
            # Disabled by observability-logs-cloudwatch (k3d / kind have no systemd journal).
      configWindows:
        extraFiles:
          application-log.conf: |
            [INPUT]
              Name                tail
              Tag                 application.*
              Exclude_Path        C:\\var\\log\\containers\\fluent-bit*, C:\\var\\log\\containers\\cloudwatch-agent*
              Path                C:\\var\\log\\containers\\*.log
              Parser              docker
              DB                  C:\\var\\fluent-bit\\state\\flb_container.db
              Mem_Buf_Limit       50MB
              Skip_Long_Lines     On
              Rotate_Wait         30
              Refresh_Interval    10
              Read_from_Head      ${READ_FROM_HEAD}

            [INPUT]
              Name                tail
              Tag                 application.*
              Path                C:\\var\\log\\containers\\fluent-bit*
              Parser              docker
              DB                  C:\\var\\fluent-bit\\state\\flb_log.db
              Mem_Buf_Limit       5MB
              Skip_Long_Lines     On
              Rotate_Wait         30
              Refresh_Interval    10
              Read_from_Head      ${READ_FROM_HEAD}

            [INPUT]
              Name                tail
              Tag                 application.*
              Path                C:\\var\\log\\containers\\cloudwatch-agent*
              Parser              docker
              DB                  C:\\var\\fluent-bit\\state\\flb_cwagent.db
              Mem_Buf_Limit       5MB
              Skip_Long_Lines     On
              Rotate_Wait         30
              Refresh_Interval    10
              Read_from_Head      ${READ_FROM_HEAD}

            [FILTER]
              Name                kubernetes
              Match               application.*
              Kube_URL            https://kubernetes.default.svc:443
              Kube_Tag_Prefix     application.C.var.log.containers.
              Merge_Log           On
              Merge_Log_Key       log_processed
              K8S-Logging.Parser  On
              K8S-Logging.Exclude Off
              Labels              On
              Annotations         Off
              Use_Kubelet         On
              Kubelet_Port        10250
              Buffer_Size         0

            [OUTPUT]
              Name                cloudwatch_logs
              Match               application.*
              region              ${AWS_REGION}
              log_group_name      {{ .Values.global.logGroupPrefix | default "/aws/containerinsights" | trimSuffix "/" }}/application
              log_stream_prefix   ${HOST_NAME}-
              auto_create_group   true
              extra_user_agent    container-insights
          dataplane-log.conf: |
            # Disabled by observability-logs-cloudwatch.
          host-log.conf: |
            # Disabled by observability-logs-cloudwatch.
  # Leave `agent.config` empty to use the default Container Insights collection
  # config. On EC2/EKS with an instance-profile or IRSA, the AWS SDK default
  # chain applies to the agent and no extra wiring is required here.
  agent:
    config: {}

# ---------------------------------------------------------------------------
# Setup Job — creates log groups + retention policies
# ---------------------------------------------------------------------------
setup:
  enabled: true
  image:
    repository: "ghcr.io/openchoreo/observability-logs-cloudwatch-setup"
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

# ---------------------------------------------------------------------------
# Adapter — the Go service that answers Observer logs queries
# ---------------------------------------------------------------------------
adapter:
  enabled: true
  replicas: 1
  image:
    repository: "ghcr.io/openchoreo/observability-logs-cloudwatch-adapter"
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 9098
  # Annotations applied to the adapter ServiceAccount. Use this to attach
  # IRSA / role-assumption annotations such as
  # eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/<role>.
  serviceAccount:
    annotations: {}
  # Upper bound for how long a single CloudWatch Logs Insights query may run.
  queryTimeoutSeconds: 30
  # Poll interval between get_query_results calls.
  queryPollMilliseconds: 500
  logLevel: INFO
  # Alerting (CloudWatch Logs metric filter + metric alarm) support.
  alerting:
    enabled: true
    metricNamespace: OpenChoreo/Logs
    alarmActionArns: []
    okActionArns: []
    insufficientDataActionArns: []
    # URL of the OpenChoreo Observer; required for webhook forwarding.
    observerUrl: "http://observer-internal:8081"
    # Anti-SSRF gate: only follow an SNS SubscribeURL when this is true
    # AND the message signature verifies.
    snsAllowSubscribeConfirm: false
    # When true, forward `OK` / `INSUFFICIENT_DATA` transitions too.
    forwardRecovery: false
    # Require a shared secret for non-SNS webhook callers such as
    # EventBridge API destinations and Lambda forwarders.
    webhookAuth:
      enabled: false
      sharedSecret: ""
      sharedSecretRef:
        name: ""
        key: token
    # Optional Gateway API HTTPRoute that exposes only the public webhook path
    # via an existing Gateway. TLS termination, listener-level auth, and any
    # rate limiting / WAF rules belong on the parent Gateway listener — this
    # route only carves out the webhook endpoint.
    webhookRoute:
      enabled: false
      # Gateway to attach to. Defaults to OpenChoreo's `gateway-default` in the
      # release namespace; override to point at a Gateway in another namespace
      # or a specific listener (sectionName).
      parentRef:
        name: gateway-default
        namespace: ""
        sectionName: ""
      # Optional hostnames matched at the route level. Leave empty to inherit
      # the Gateway listener's hostname.
      hostnames: []
  networkPolicy:
    enabled: false
    observerNamespaceLabels:
      kubernetes.io/metadata.name: openchoreo-observability-plane
    observerPodLabels: {}
    # Namespace labels for the Gateway data-plane pods that proxy the webhook
    # to the adapter. Default empty: when the route is enabled, set this to
    # match your Gateway controller's data-plane namespace
    # (e.g. `kubernetes.io/metadata.name: openchoreo-data-plane`).
    gatewayNamespaceLabels: {}
    allowProbeIPBlock: ""
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
