common:
  openObserveOrg: "default"
  openObserveStream: "default"


fluent-bit:
  enabled: true

  existingConfigMap: "fluent-bit"

  dnsPolicy: ClusterFirstWithHostNet

  env:
  - name: OPENOBSERVE_USERNAME
    valueFrom:
      secretKeyRef:
        name: openobserve-admin-credentials
        key: ZO_ROOT_USER_EMAIL
  - name: OPENOBSERVE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: openobserve-admin-credentials
        key: ZO_ROOT_USER_PASSWORD

  fullnameOverride: "fluent-bit"

  hostNetwork: true

  extraVolumeMounts:
  - name: db
    mountPath: "/var/lib/fluent-bit/db"
    readOnly: false

  extraVolumes:
    - name: db
      hostPath:
        path: /var/lib/fluent-bit/db
        type: DirectoryOrCreate

  rbac:
    nodeAccess: true

  resources:
    limits:
      cpu: 100m
      memory: 150Mi
    requests:
      cpu: 25m
      memory: 125Mi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10000

  testFramework:
    enabled: false

  initContainers:
  - name: set-volume-ownership
    image: busybox:1.36
    command: ["sh", "-c", "chown -R 10000:10000 /var/lib/fluent-bit/db"]
    resources:
      limits:
        cpu: 15m
        memory: "32Mi"
      requests:
        cpu: 10m
        memory: "24Mi"
    securityContext:
      capabilities:
        add:
        - CHOWN
        drop:
        - ALL
      readOnlyRootFilesystem: true
      runAsUser: 0
    volumeMounts:
    - name: db
      mountPath: /var/lib/fluent-bit/db

  # Values for fluent-bit config map
  openObserveHost: "openobserve"
  openObservePort: 5080
  openObserveTls: "Off"

openobserve-standalone:
  enabled: true
  fullnameOverride: "openobserve"
  auth:
    ZO_ROOT_USER_EMAIL: ""
    ZO_ROOT_USER_PASSWORD: ""
    existingRootUserSecret:
      name: "openobserve-admin-credentials"
  persistence:
    enabled: true
    size: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1000Mi
    requests:
      cpu: 20m
      memory: 500Mi

  ## OpenChoreo specific values. These are not passed to the upstream chart
  httpRouteHostnames: []

openobserve:
  enabled: false
  fullnameOverride: "openobserve"

## -----------------------------------------------------------
## Values for OpenChoreo specific customizations and workloads
## -----------------------------------------------------------

adapter:
  enabled: true
  observerUrl: "http://observer-internal.openchoreo-observability-plane:8081"
  image:
    repository: "ghcr.io/openchoreo/observability-logs-openobserve-adapter"
    tag: "latest"
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

openObserveSetup:
  enabled: true
  image:
    repository: "ghcr.io/openchoreo/observability-logs-openobserve-setup"
    tag: ""
