{{- if (index .Values "fluent-bit").enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit
  namespace: {{ .Release.Namespace }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        Plugins_File  plugins.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name tail
        Buffer_Chunk_Size 32KB
        Buffer_Max_Size 2MB
        DB /var/lib/fluent-bit/db/tail-container-logs.db
        Exclude_Path /var/log/containers/fluent-bit-*.log
        Inotify_Watcher false
        Mem_Buf_Limit 100MB
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Read_from_Head On
        Refresh_Interval 5
        Skip_Long_Lines On
        Tag kube.*

    [FILTER]
        Name multiline
        Match kube.*
        multiline.key_content log
        mode parser
        multiline.parser go, java, python, dotnet
        buffer On
        flush_ms 2000

    [FILTER]
        Name kubernetes
        Buffer_Size 15MB
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
        Keep_Log On
        Match kube.*
        Merge_Log Off
        tls.verify Off
        Use_Kubelet true

    [OUTPUT]
        Name opensearch
        Host {{ index .Values "fluent-bit" "openSearchHost" }}
        Port {{ index .Values "fluent-bit" "openSearchPort" }}
        Generate_ID On
        HTTP_Passwd ${OPENSEARCH_PASSWORD}
        HTTP_User ${OPENSEARCH_USERNAME}
        Logstash_Format On
        Logstash_DateFormat %Y-%m-%d
        Logstash_Prefix container-logs
        Match kube.*
        Replace_Dots On
        Suppress_Type_Name On
        tls On
        tls.verify Off
        tls.vhost {{ index .Values "fluent-bit" "openSearchVHost" | default "opensearch" }}

  parsers.conf: |
    [PARSER]
        Name docker_no_time
        Format json
        Time_Keep Off
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L

    # The go, java and python multiline parsers referenced by the multiline
    # filter above are built into Fluent Bit. .NET is not, so it is defined
    # here as a custom parser. A .NET stack trace starts with a line that
    # ends in "Exception: <message>" and continues with "   at ..." frames,
    # nested "---> <inner exception>" lines and "--- End of ... ---" markers.
    # The "--- End of ..." and "--->" markers are emitted at column 0, so the
    # continuation rule allows leading whitespace to be optional.
    #
    # To support another log format not covered by the built-ins, add a
    # [MULTILINE_PARSER] here (type regex) and append its name to
    # `multiline.parser` on the multiline filter. See
    # https://docs.fluentbit.io/manual/data-pipeline/filters/multiline-stacktrace
    [MULTILINE_PARSER]
        name          dotnet
        type          regex
        flush_timeout 2000
        rule          "start_state" "/^.*Exception[:,].*$/" "cont"
        rule          "cont"        "/^\s*(at |--- End of|---> ).*$/" "cont"
{{- end }}
