global:
  # Registry override for the module's own container images (adapter, setup).
  # When set, it replaces the registry host of each image repository. May
  # include a path (e.g. registry.example.com/ghcr.io) for path-preserving
  # mirrors. Empty uses each image's default registry.
  # NOTE: subchart images are governed by the subcharts' own keys — the
  # bundled OpenSearch chart uses global.dockerRegistry (it flows to
  # subcharts); the fluent-bit image needs fluent-bit.image.repository.
  imageRegistry: ""
  # Pull secrets for the module's own pods, for authenticated mirrors.
  # e.g. imagePullSecrets: [{name: my-registry-cred}]
  imagePullSecrets: []

fluent-bit:
  enabled: false

  existingConfigMap: "fluent-bit"

  env:
  - name: OPENSEARCH_USERNAME
    valueFrom:
      secretKeyRef:
        name: opensearch-admin-credentials
        key: username
  - name: OPENSEARCH_PASSWORD
    valueFrom:
      secretKeyRef:
        name: opensearch-admin-credentials
        key: password

  dnsPolicy: ClusterFirstWithHostNet
  fullnameOverride: "fluent-bit"
  hostNetwork: true

  extraVolumeMounts:
  - name: db
    mountPath: "/var/lib/fluent-bit/db"
    readOnly: false

  extraVolumes:
    - name: db
      hostPath:
        path: /var/lib/fluent-bit/db
        type: DirectoryOrCreate

  rbac:
    nodeAccess: true

  resources:
    limits:
      cpu: 100m
      memory: 150Mi
    requests:
      cpu: 25m
      memory: 125Mi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10000

  testFramework:
    enabled: false

  # Passed as a templatable string (the fluent-bit chart tpl-evaluates string
  # values in its own context, where the shared global.imageRegistry resolves)
  # so the init image honors the registry override.
  initContainers: |-
    - name: set-volume-ownership
      image: "{{ with .Values.global.imageRegistry }}{{ . }}/{{ end }}busybox:1.37.0"
      command: ["sh", "-c", "chown -R 10000:10000 /var/lib/fluent-bit/db"]
      resources:
        limits:
          cpu: 15m
          memory: "32Mi"
        requests:
          cpu: 10m
          memory: "24Mi"
      securityContext:
        capabilities:
          drop:
          - ALL
        privileged: true
        readOnlyRootFilesystem: true
        runAsUser: 0
      volumeMounts:
      - name: db
        mountPath: /var/lib/fluent-bit/db

  # Values for fluent-bit config map
  openSearchHost: "opensearch"
  openSearchPort: 9200
  openSearchVHost: "opensearch"

openSearch:
  enabled: true

  extraEnvs:
    - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
      value: ThisIsTheOpenSearchPassword1

  nameOverride: "opensearch"

  image:
    tag: "3.3.0"

  masterService: opensearch

  rbac:
    create: true
    serviceAccountName: "opensearch"

  singleNode: true


## -----------------------------------------------------------
## Values for OpenChoreo specific customizations and workloads
## -----------------------------------------------------------

openSearchCluster:
  enabled: false

  # SNI hostnames for the TLS passthrough TLSRoute that exposes OpenSearch
  # through the gateway. These must match the gateway tlsPassthrough listener
  # hostname and the SNI that remote fluent-bit clients present
  # (fluent-bit.openSearchVHost). They also need to be present in the OpenSearch
  # server certificate's dnsNames. Required by Gateway API v1 (spec.hostnames is
  # mandatory for TLSRoute).
  tlsRoute:
    hostnames:
      - "opensearch.observability.openchoreo.localhost"

  bootstrap:
    resources:
      limits:
        cpu: 1000m
        memory: 1000Mi
      requests:
        cpu: 100m
        memory: 1000Mi

  general:
    setVMMaxMapCount: true
    version: 3.3.0

  dashboards:
    enable: false
    replicas: 1
    version: 3.3.0

  nodePools:
    data:
      replicas: 2
      diskSize: 5Gi
      resources:
        limits:
          cpu: 1000m
          memory: 1000Mi
        requests:
          cpu: 100m
          memory: 1000Mi

    master:
      replicas: 3
      diskSize: 1Gi
      resources:
        limits:
          cpu: 1000m
          memory: 900Mi
        requests:
          cpu: 100m
          memory: 900Mi

  credentialsSecretName: ""

  internalUsers: |
    # This is the internal user database
    # The hash value is a bcrypt hash and can be generated with plugin/tools/hash.sh

    _meta:
      type: "internalusers"
      config_version: 2

    admin:
      hash: "%s"
      reserved: true
      backend_roles:
      - "admin"
      description: "Admin user"

adapter:
  enabled: true
  observerUrl: "http://observer-internal.openchoreo-observability-plane:8081"
  openSearchSecretName: ""
  image:
    repository: "ghcr.io/openchoreo/observability-logs-opensearch-adapter"
    tag: ""
  resources:
    limits:
      cpu: 100m
      memory: 100Mi
    requests:
      cpu: 50m
      memory: 64Mi

openSearchSetup:
  enabled: true
  image:
    repository: "ghcr.io/openchoreo/observability-logs-opensearch-setup"
  openSearchSecretName: ""

  alertingWebhookUrl: "http://observer-internal.openchoreo-observability-plane:8081/api/v1alpha1/alerts/webhook"

  dataRetentionTime:
    containerLogs: "30d"
    k8sEvents: "30d"
