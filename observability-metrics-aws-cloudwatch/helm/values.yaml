# ---------------------------------------------------------------------------
# AWS region — required. Propagated to the OpenTelemetry collector and the
# adapter.
# ---------------------------------------------------------------------------
region: ""

# AWS authentication.
#
# Default: EKS Pod Identity / IRSA / EC2 instance-profile via the AWS SDK
# default credentials chain. No chart-managed Secret is created.
#
# For k3d / kind / non-EKS targets, flip `create: true` and supply
# `accessKeyId` / `secretAccessKey`. The chart will create a Secret and the
# adapter envFrom's it. The OpenTelemetry collector also envFrom's it via the
# `opentelemetry-collector.extraEnvsFrom` block (see below).
awsCredentials:
  create: false
  name: ""
  accessKeyId: ""
  secretAccessKey: ""

# ---------------------------------------------------------------------------
# kube-state-metrics subchart.
# Enabled by default. Set kubeStateMetrics.enabled=false if
# kube-state-metrics is already running in the cluster. The chart
# hardcodes the metricLabelsAllowlist so the OpenChoreo UID labels are
# available on kube_pod_container_resource_* series.
# ---------------------------------------------------------------------------
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  fullnameOverride: kube-state-metrics
  metricLabelsAllowlist:
    - pods=[openchoreo.dev/component-uid,openchoreo.dev/environment-uid,openchoreo.dev/project-uid]

# ---------------------------------------------------------------------------
# OpenTelemetry collector subchart
# ---------------------------------------------------------------------------
opentelemetry-collector:
  fullnameOverride: metrics-opentelemetry-collector
  enabled: true
  mode: daemonset
  image:
    # The upstream opentelemetry-collector-contrib image bundles
    # kubeletstats and the awsemf exporter we need.
    repository: otel/opentelemetry-collector-contrib
    tag: 0.149.0
  serviceAccount:
    create: true
    # Annotations applied to the OpenTelemetry collector ServiceAccount. Use this to
    # attach IRSA / Pod Identity:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/<role>
    annotations: {}
  clusterRole:
    create: false
  # Extra environment variables for the collector container, consumed by the
  # collector config below. K8S_NODE_IP is the kubeletstats scrape endpoint host;
  # K8S_NODE_NAME is the CloudWatch Logs stream name. AWS_REGION and
  # EMF_LOG_GROUP_NAME come from the metrics-aws-cloudwatch-cluster-env ConfigMap
  # via extraEnvsFrom (below).
  extraEnvs:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
  # Override at install time on k3d/kind to pull static credentials in:
  #   --set "opentelemetry-collector.extraEnvsFrom[1].secretRef.name=<awsCredentials.name>"
  extraEnvsFrom:
    - configMapRef:
        name: metrics-aws-cloudwatch-cluster-env
  hostNetwork: false
  presets:
    kubernetesAttributes:
      enabled: false # we render our own k8sattributes processor
  config:
    receivers:
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: ${env:K8S_NODE_IP}:10250
        insecure_skip_verify: true
        metric_groups: [pod, container]
      prometheus:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels: [__meta_kubernetes_service_name]
                  regex: .*kube-state-metrics
                  action: keep
                - source_labels: [__meta_kubernetes_endpoint_port_name]
                  regex: http(-metrics)?
                  action: keep
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: kube_pod_container_resource_(requests|limits)
                  action: keep
      # Dedicated Hubble L7 HTTP scrape. Cilium exposes the headless
      # `hubble-metrics` service on port 9965 when hubble.metrics.enabled is
      # non-empty (httpV2). These series carry source/destination pod + IP
      # labels that the dual-sided enrichment below maps to OpenChoreo
      # component identity. Kept on a separate receiver so it can run through
      # its own enrichment pipeline (metrics/hubble).
      prometheus/hubble:
        config:
          scrape_configs:
            - job_name: hubble
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels:
                    [__meta_kubernetes_namespace, __meta_kubernetes_service_name]
                  regex: kube-system;hubble-metrics
                  action: keep
                # The headless hubble-metrics service advertises the agent's
                # named container port (4244) on its Endpoints. Force the scrape
                # to the Hubble metrics port 9965 regardless of discovered port.
                - source_labels: [__address__]
                  regex: '(.+):\d+'
                  target_label: __address__
                  # `$$` escapes the OTel config env-var resolver so Prometheus
                  # receives a literal `${1}` relabel group reference.
                  replacement: '$${1}:9965'
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: hubble_http_requests_total|hubble_http_request_duration_seconds(_sum|_count|_bucket)?
                  action: keep
      # Second Hubble scrape dedicated to preserving the duration histogram's
      # explicit `le` buckets, which are needed for latency percentiles. The
      # awsemf exporter collapses an assembled explicit-bucket histogram to
      # {Count,Sum} and discards the bucket distribution, so p50/p90/p99 cannot
      # be derived from the primary `prometheus/hubble` path. Here we keep ONLY
      # the `_bucket` series and rename it to a standalone name so the OTel
      # prometheus receiver does NOT fold it back into the
      # `hubble_http_request_duration_seconds` histogram family; it then flows
      # through as an ordinary series carrying the `le` label, which awsemf writes
      # as an EMF field the adapter reconstructs quantiles from. The primary
      # scrape above is left untouched (no regression to count/error/mean).
      prometheus/hubble-buckets:
        config:
          scrape_configs:
            - job_name: hubble-buckets
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels:
                    [__meta_kubernetes_namespace, __meta_kubernetes_service_name]
                  regex: kube-system;hubble-metrics
                  action: keep
                - source_labels: [__address__]
                  regex: '(.+):\d+'
                  target_label: __address__
                  replacement: '$${1}:9965'
              metric_relabel_configs:
                # Keep only the duration histogram bucket series.
                - source_labels: [__name__]
                  regex: hubble_http_request_duration_seconds_bucket
                  action: keep
                # Rename so the receiver does not treat it as a histogram member.
                - source_labels: [__name__]
                  regex: hubble_http_request_duration_seconds_bucket
                  target_label: __name__
                  replacement: hubble_http_request_duration_seconds_lebucket
    processors:
      k8sattributes:
        auth_type: serviceAccount
        extract:
          labels:
            - tag_name: ComponentUID
              key: openchoreo.dev/component-uid
              from: pod
            - tag_name: ProjectUID
              key: openchoreo.dev/project-uid
              from: pod
            - tag_name: EnvironmentUID
              key: openchoreo.dev/environment-uid
              from: pod
            - tag_name: Namespace
              key: openchoreo.dev/namespace
              from: pod
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
      metricstransform:
        transforms:
          # kubeletstats v0.125+ emits `k8s.pod.cpu.usage` by default. This
          # is raw CPU usage in cores, matching the CPU limit units from KSM.
          - include: k8s.pod.cpu.usage
            action: update
            new_name: pod_cpu_usage
          - include: k8s.pod.memory.working_set
            action: update
            new_name: pod_memory_usage
          # kube-state-metrics emits one series per resource type, distinguished
          # by a `resource` label. Split into named cpu/memory variants.
          - include: kube_pod_container_resource_requests
            match_type: strict
            experimental_match_labels: {resource: cpu}
            action: insert
            new_name: pod_cpu_request
          - include: kube_pod_container_resource_requests
            match_type: strict
            experimental_match_labels: {resource: memory}
            action: insert
            new_name: pod_memory_request
          - include: kube_pod_container_resource_limits
            match_type: strict
            experimental_match_labels: {resource: cpu}
            action: insert
            new_name: pod_cpu_limit
          - include: kube_pod_container_resource_limits
            match_type: strict
            experimental_match_labels: {resource: memory}
            action: insert
            new_name: pod_memory_limit
      groupbyattrs:
        # KSM-scraped series carry `pod` and `namespace` as data point
        # attributes. Promote them to resource attributes so k8sattributes
        # can match the workload pod (not the KSM pod).
        keys: [pod, namespace]
      resource/promlabels:
        # After groupbyattrs lifts `pod`/`namespace` to resource level,
        # overwrite the scrape target's pod identity with the workload pod
        # identity that k8sattributes uses for pod_association matching.
        attributes:
          - action: delete
            key: k8s.pod.uid
          - action: upsert
            key: k8s.pod.name
            from_attribute: pod
          - action: upsert
            key: k8s.namespace.name
            from_attribute: namespace
      # --- Hubble dual-sided pod -> component enrichment ---------------------
      # Hubble series carry TWO pod identities (source_pod/source_ip and
      # destination_pod/destination_ip) as data-point attributes. k8sattributes
      # enriches ONE pod per resource, so we run two passes. Each pass lifts one
      # side's IP to a resource attribute (k8s.pod.ip), associates the pod by IP,
      # and stamps that pod's OpenChoreo labels under Source*/Destination* tag
      # names. Namespaces come directly from Hubble's *_namespace labels.
      # Convert Hubble's cumulative counters/histograms to per-interval deltas
      # up front, keyed by the original Hubble labels. Downstream the adapter
      # simply sums delta values over the query window (correct across counter
      # resets), instead of reconstructing increases from cumulative min/max.
      # The renamed bucket series arrives as an untyped Gauge (the receiver has no
      # histogram metadata for the standalone name). Classic histogram buckets are
      # cumulative monotonic counters, so convert it to a cumulative Sum before
      # cumulativetodelta can turn it into per-interval deltas.
      transform/hubble-buckets:
        metric_statements:
          - context: metric
            statements:
              - convert_gauge_to_sum("cumulative", true) where name == "hubble_http_request_duration_seconds_lebucket"
      cumulativetodelta/hubble:
        include:
          match_type: strict
          metrics:
            - hubble_http_requests_total
            - hubble_http_request_duration_seconds
            - hubble_http_request_duration_seconds_lebucket
      groupbyattrs/hubble-source:
        keys: [source_ip]
      resource/hubble-source-ip:
        attributes:
          - action: upsert
            key: k8s.pod.ip
            from_attribute: source_ip
      k8sattributes/hubble-source:
        auth_type: serviceAccount
        extract:
          # Only the OpenChoreo identity labels; suppress the default pod/owner
          # metadata (k8s.pod.name, k8s.deployment.name, ...) that would bloat
          # the EMF and reflect the wrong side after the second pass.
          metadata: []
          labels:
            - tag_name: SourceComponentUID
              key: openchoreo.dev/component-uid
              from: pod
            - tag_name: SourceComponent
              key: openchoreo.dev/component
              from: pod
            - tag_name: SourceProjectUID
              key: openchoreo.dev/project-uid
              from: pod
            - tag_name: SourceEnvironmentUID
              key: openchoreo.dev/environment-uid
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
      groupbyattrs/hubble-destination:
        keys: [destination_ip]
      resource/hubble-destination-ip:
        attributes:
          - action: upsert
            key: k8s.pod.ip
            from_attribute: destination_ip
      k8sattributes/hubble-destination:
        auth_type: serviceAccount
        extract:
          metadata: []
          labels:
            - tag_name: DestinationComponentUID
              key: openchoreo.dev/component-uid
              from: pod
            - tag_name: DestinationComponent
              key: openchoreo.dev/component
              from: pod
            - tag_name: DestinationProjectUID
              key: openchoreo.dev/project-uid
              from: pod
            - tag_name: DestinationEnvironmentUID
              key: openchoreo.dev/environment-uid
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
      batch:
        timeout: 30s
        send_batch_size: 8192
    exporters:
      debug:
        verbosity: basic
      awsemf:
        region: ${env:AWS_REGION}
        namespace: OpenChoreo/Metrics
        log_group_name: ${env:EMF_LOG_GROUP_NAME}
        log_stream_name: ${env:K8S_NODE_NAME}
        # Retention applied by the awsemfexporter itself whenever it creates
        # the log group, so retention survives manual log-group deletion.
        # Sourced from metrics.retentionDays via the env-configmap. The
        # post-install Job in metrics-retention.yaml is belt-and-suspenders.
        log_retention: ${env:EMF_RETENTION_DAYS}
        dimension_rollup_option: NoDimensionRollup
        resource_to_telemetry_conversion:
          enabled: true
        metric_declarations:
          - dimensions:
              - [ComponentUID, EnvironmentUID, Namespace]
            metric_name_selectors:
              - "pod_cpu_usage"
              - "pod_memory_usage"
              - "pod_cpu_request"
              - "pod_cpu_limit"
              - "pod_memory_request"
              - "pod_memory_limit"
      # Hubble EMF exporter. Writes enriched L7 series to the SAME log group as
      # a separate log stream. Uses an empty dimension set so the high-cardinality
      # source x destination edge pairs are NOT promoted to CloudWatch metrics —
      # the per-edge detail lives in the EMF log FIELDS, which the adapter reads
      # via Logs Insights (Option B). Cost scales with log volume, not edge count.
      awsemf/hubble:
        region: ${env:AWS_REGION}
        namespace: OpenChoreo/HubbleMetrics
        log_group_name: ${env:EMF_LOG_GROUP_NAME}
        log_stream_name: ${env:K8S_NODE_NAME}-hubble
        log_retention: ${env:EMF_RETENTION_DAYS}
        dimension_rollup_option: NoDimensionRollup
        resource_to_telemetry_conversion:
          enabled: true
        metric_declarations:
          - dimensions: [[]]
            metric_name_selectors:
              - "hubble_http_requests_total"
              - "hubble_http_request_duration_seconds"
              - "hubble_http_request_duration_seconds_lebucket"
    extensions:
      health_check: {}
    service:
      telemetry:
        metrics:
          level: none
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [kubeletstats, prometheus]
          processors: [groupbyattrs, resource/promlabels, k8sattributes, metricstransform, batch]
          exporters: [awsemf]
        metrics/hubble:
          receivers: [prometheus/hubble]
          processors:
            - cumulativetodelta/hubble
            - groupbyattrs/hubble-source
            - resource/hubble-source-ip
            - k8sattributes/hubble-source
            - groupbyattrs/hubble-destination
            - resource/hubble-destination-ip
            - k8sattributes/hubble-destination
            - batch
          exporters: [awsemf/hubble]
        # Histogram-bucket path for latency percentiles. Same dual-sided
        # enrichment as metrics/hubble, with the extra transform that makes the
        # renamed bucket series a cumulative Sum before delta conversion.
        metrics/hubble-buckets:
          receivers: [prometheus/hubble-buckets]
          processors:
            - transform/hubble-buckets
            - cumulativetodelta/hubble
            - groupbyattrs/hubble-source
            - resource/hubble-source-ip
            - k8sattributes/hubble-source
            - groupbyattrs/hubble-destination
            - resource/hubble-destination-ip
            - k8sattributes/hubble-destination
            - batch
          exporters: [awsemf/hubble]

# ---------------------------------------------------------------------------
# Metric storage settings.
# ---------------------------------------------------------------------------
metrics:
  namespace: OpenChoreo/Metrics
  # Empty means /aws/openchoreo/metrics.
  logGroup: ""
  retentionDays: 7
  retention:
    enabled: true
    image:
      repository: public.ecr.aws/aws-cli/aws-cli
      tag: "2.34.44"
      pullPolicy: IfNotPresent
    serviceAccount:
      create: true
      name: ""
      annotations: {}
    backoffLimit: 3
    ttlSecondsAfterFinished: 300

# ---------------------------------------------------------------------------
# Adapter — Go service that answers Observer metrics queries
# ---------------------------------------------------------------------------
adapter:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/openchoreo/observability-metrics-aws-cloudwatch-adapter 
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 9099
  serviceAccount:
    annotations: {}
  logLevel: INFO
  queryTimeoutSeconds: 30

  alerting:
    enabled: true
    alarmActionArns: []
    okActionArns: []
    insufficientDataActionArns: []
    observerUrl: "http://observer-internal:8081"
    snsAllowSubscribeConfirm: false
    forwardRecovery: false
    webhookAuth:
      enabled: false
      sharedSecret: ""
      sharedSecretRef:
        name: ""
        key: token
    webhookRoute:
      enabled: false
      # Gateway to attach to. Defaults to OpenChoreo's `gateway-default` in the
      # release namespace; override to point at a Gateway in another namespace
      # or a specific listener (sectionName).
      parentRef:
        name: gateway-default
        namespace: ""
        sectionName: ""
      # Optional hostnames matched at the route level. Leave empty to inherit
      # the Gateway listener's hostname.
      hostnames: []
  networkPolicy:
    enabled: false
    observerNamespaceLabels:
      kubernetes.io/metadata.name: openchoreo-observability-plane
    observerPodLabels: {}
    # Namespace labels for the Gateway data-plane pods that proxy the webhook
    # to the adapter. Default empty: when the route is enabled, set this to
    # match your Gateway controller's data-plane namespace
    # (e.g. `kubernetes.io/metadata.name: openchoreo-data-plane`).
    gatewayNamespaceLabels: {}
    gatewayPodLabels: {}
    allowProbeIPBlock: ""
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
