{{- if and .Values.adapter.enabled .Values.adapter.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "metrics-azure-monitor.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-adapter-azure-monitor
  annotations:
    azure.workload.identity/client-id: {{ .Values.adapter.serviceAccount.clientId | quote }}
    {{- with .Values.adapter.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- /*
The referenced User-Assigned Managed Identity needs these role assignments:
  Log Analytics Reader   on the workspace          (run KQL queries)
  Monitoring Contributor on the resource group     (scheduledQueryRules CRUD)
  Reader                 on the Action Group        (boot reachability check)
plus a federated credential whose subject is
  system:serviceaccount:<release-namespace>:<this ServiceAccount>.
*/ -}}
{{- end }}
