{{- if .Values.adapter.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-adapter-gcp-cloudmonitoring
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-adapter-gcp-cloudmonitoring
  {{- with .Values.adapter.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /*
Required GCP IAM roles when the adapter is installed as-is. Grant these to the
Google service account bound to this Kubernetes ServiceAccount:

  Project scope (gcp.projectId):
    - roles/monitoring.viewer   # read time series (metrics query)
    - roles/monitoring.editor   # create/update/delete alert policies and read
                                # the notification channel (alerting)

roles/monitoring.editor is only needed when alerting is enabled (both
adapter.observerUrl and notificationChannel.id set); a metrics-query-only
install needs just roles/monitoring.viewer.

Bind via GKE Workload Identity: create the binding on the GSA, then annotate
this ServiceAccount with
  iam.gke.io/gcp-service-account: <gsa>@<project>.iam.gserviceaccount.com
through adapter.serviceAccount.annotations. On non-GKE clusters, mount a static
key and set GOOGLE_APPLICATION_CREDENTIALS instead.
*/ -}}
{{- end }}
