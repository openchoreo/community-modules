apiVersion: v2
name: observability-metrics-prometheus
description: A Helm chart for OpenChoreo Observability Metrics module based on Prometheus
type: application
# Version strategy: latest-dev for development, replaced by CI for releases
version: 0.0.0-latest-dev
appVersion: "latest-dev"
keywords:
  - prometheus
  - observability
  - metrics
home: https://github.com/openchoreo/community-modules
maintainers:
  - name: OpenChoreo Team
dependencies:
  - name: kube-prometheus-stack
    repository: https://prometheus-community.github.io/helm-charts
    version: 81.6.3
    condition: kube-prometheus-stack.enabled
