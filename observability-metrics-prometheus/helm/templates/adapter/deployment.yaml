{{- if ne .Values.global.installationMode "multiClusterExporter" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-adapter-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-adapter-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-adapter-prometheus
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/adapter/configmap.yaml") . | sha256sum }}
      labels:
        app: metrics-adapter-prometheus
    spec:
      serviceAccountName: metrics-adapter-prometheus
      securityContext:
        runAsUser: 10500
        runAsGroup: 10500
        runAsNonRoot: true
      containers:
      - name: metrics-adapter-prometheus
        image: "{{ .Values.adapter.image.repository }}:{{ .Values.adapter.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.adapter.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: 9099
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9099
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9099
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 2
          failureThreshold: 3
        envFrom:
        - configMapRef:
            name: metrics-adapter-prometheus
        resources:
          limits:
            cpu: {{ .Values.adapter.resources.limits.cpu }}
            memory: {{ .Values.adapter.resources.limits.memory }}
          requests:
            cpu: {{ .Values.adapter.resources.requests.cpu }}
            memory: {{ .Values.adapter.resources.requests.memory }}
{{- end }}
