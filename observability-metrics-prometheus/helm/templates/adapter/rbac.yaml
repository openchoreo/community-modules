{{- if ne .Values.global.installationMode "multiClusterExporter" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-adapter-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-adapter-prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metrics-adapter-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-adapter-prometheus
rules:
- apiGroups:
  - monitoring.coreos.com
  resources:
  - prometheusrules
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metrics-adapter-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-adapter-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: metrics-adapter-prometheus
subjects:
- kind: ServiceAccount
  name: metrics-adapter-prometheus
  namespace: {{ .Release.Namespace }}
{{- end }}
