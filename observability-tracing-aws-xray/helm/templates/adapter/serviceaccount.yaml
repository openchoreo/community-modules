{{- if .Values.adapter.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tracing-adapter-aws-xray
  namespace: {{ .Release.Namespace }}
  labels:
    app: tracing-adapter-aws-xray
  {{- with .Values.adapter.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /*
Required IAM permissions for the adapter:
  xray:GetTraceSummaries, xray:BatchGetTraces, xray:GetTraceGraph,
  sts:GetCallerIdentity.

Required IAM permissions for the collector:
  xray:PutTraceSegments, xray:PutTelemetryRecords,
  xray:GetSamplingRules, xray:GetSamplingTargets,
  xray:GetSamplingStatisticSummaries.
*/ -}}
{{- end }}
