{{- if .Values.adapter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracing-adapter-azure-appinsights
  namespace: {{ .Release.Namespace }}
  labels:
    app: tracing-adapter-azure-appinsights
spec:
  replicas: {{ .Values.adapter.replicas }}
  selector:
    matchLabels:
      app: tracing-adapter-azure-appinsights
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/adapter/configmap.yaml") . | sha256sum }}
      labels:
        app: tracing-adapter-azure-appinsights
        {{- if .Values.adapter.serviceAccount.annotations }}
        azure.workload.identity/use: "true"
        {{- end }}
        {{- with .Values.adapter.serviceAccount.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: tracing-adapter-azure-appinsights
      securityContext:
        runAsUser: 10500
        runAsGroup: 10500
        runAsNonRoot: true
      containers:
        - name: adapter
          image: "{{ .Values.adapter.image.repository }}:{{ .Values.adapter.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.adapter.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.adapter.service.port }}
          envFrom:
            - configMapRef:
                name: tracing-adapter-azure-appinsights
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.adapter.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.adapter.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.adapter.resources | nindent 12 }}
{{- end }}
