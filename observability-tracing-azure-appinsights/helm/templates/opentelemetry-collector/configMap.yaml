apiVersion: v1
kind: ConfigMap
metadata:
  name: opentelemetry-collector
  namespace: {{ .Release.Namespace }}
data:
  relay: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      {{- if or (eq .Values.global.installationMode "singleCluster") (eq .Values.global.installationMode "multiClusterReceiver") }}
      azuremonitor:
        connection_string: ${env:APPINSIGHTS_CONNECTION_STRING}
      {{- end }}
      {{- if (eq .Values.global.installationMode "multiClusterExporter") }}
      otlp:
        endpoint: {{ .Values.opentelemetryCollectorCustomizations.http.observabilityPlaneUrl }}
        tls:
          insecure: true # TODO: Enable mTLS between collectors
        {{- with .Values.opentelemetryCollectorCustomizations.http.observabilityPlaneVirtualHost }}
        headers:
          Host: {{ . | quote }}
        {{- end }}
      {{- end }}

    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133

    processors:
      {{- if or (eq .Values.global.installationMode "singleCluster") (eq .Values.global.installationMode "multiClusterExporter") }}
      # NOTE: "k8sattributes" was renamed "k8s_attributes" upstream; the old
      # name is a working alias on every contrib version this chart supports,
      # and the only one accepted by older images. Rename once the pinned
      # subchart's appVersion is >= 0.153.0 everywhere.
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false

        extract:
          labels:
            - tag_name: $$1
              key_regex: (.*)
              from: pod

          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
      {{- end }}
      {{- if .Values.opentelemetryCollectorCustomizations.tailSampling.enabled }}
      tail_sampling:
        decision_wait: {{ .Values.opentelemetryCollectorCustomizations.tailSampling.decisionWait }}
        num_traces: {{ .Values.opentelemetryCollectorCustomizations.tailSampling.numTraces }}
        expected_new_traces_per_sec: {{ .Values.opentelemetryCollectorCustomizations.tailSampling.expectedNewTracesPerSec }}
        decision_cache:
          sampled_cache_size: {{ .Values.opentelemetryCollectorCustomizations.tailSampling.decisionCache.sampledCacheSize }}
          non_sampled_cache_size: {{ .Values.opentelemetryCollectorCustomizations.tailSampling.decisionCache.nonSampledCacheSize }}
        policies: [
            {
              name: rate_limiting,
              type: rate_limiting,
              rate_limiting: {spans_per_second: {{ .Values.opentelemetryCollectorCustomizations.tailSampling.spansPerSecond }} }
            },
        ]
      {{- end }}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          {{- $processors := list }}
          {{- if or (eq .Values.global.installationMode "singleCluster") (eq .Values.global.installationMode "multiClusterExporter") }}
          {{- $processors = append $processors "k8sattributes" }}
          {{- end }}
          {{- if .Values.opentelemetryCollectorCustomizations.tailSampling.enabled }}
          {{- $processors = append $processors "tail_sampling" }}
          {{- end }}
          {{- if $processors }}
          processors: [{{ join ", " $processors }}]
          {{- end }}
          {{- if or (eq .Values.global.installationMode "singleCluster") (eq .Values.global.installationMode "multiClusterReceiver") }}
          exporters: [azuremonitor]
          {{- end }}
          {{- if (eq .Values.global.installationMode "multiClusterExporter") }}
          exporters: [otlp]
          {{- end }}
