apiVersion: v2
name: observability-tracing-gcp-cloudtrace
description: A Helm chart for OpenChoreo Observability Tracing module with OpenTelemetry Collector and Google Cloud Trace
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - gcp
  - cloud-trace
  - observability
  - tracing
home: https://github.com/openchoreo/community-modules
maintainers:
  - name: OpenChoreo Team
dependencies:
  - name: opentelemetry-collector
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: 0.146.1
    condition: opentelemetry-collector.enabled
