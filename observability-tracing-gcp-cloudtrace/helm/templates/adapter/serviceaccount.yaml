{{- if .Values.adapter.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tracing-adapter-gcp-cloudtrace
  namespace: {{ .Release.Namespace }}
  labels:
    app: tracing-adapter-gcp-cloudtrace
  {{- with .Values.adapter.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /*
Required GCP IAM roles when the adapter is installed as-is:

  Project scope:
    - roles/cloudtrace.user   # ListTraces / GetTrace through the v1 read API

The identity is whichever Application Default Credentials pick up: on GKE
this is typically a Google Service Account bound to this ServiceAccount via
Workload Identity. Annotate the SA with `iam.gke.io/gcp-service-account` to
bind it, and grant the GSA roles/iam.workloadIdentityUser for
"<project-id>.svc.id.goog[<namespace>/tracing-adapter-gcp-cloudtrace]".
*/ -}}
{{- end }}
