global:
  # Supports "singleCluster", "multiClusterExporter", "multiClusterReceiver"
  installationMode: "singleCluster"

common:
  openObserveOrg: "default"
  openObserveStream: "default"
  openObserveHost: "openobserve"
  openObservePort: 5080
  openObserveTlsEnabled: false


openobserve-standalone:
  enabled: true
  fullnameOverride: "openobserve"
  auth:
    ZO_ROOT_USER_EMAIL: ""
    ZO_ROOT_USER_PASSWORD: ""
    existingRootUserSecret:
      name: "openobserve-admin-credentials"
  persistence:
    enabled: true
    size: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1000Mi
    requests:
      cpu: 20m
      memory: 500Mi

openobserve:
  enabled: false
  fullnameOverride: "openobserve"

opentelemetry-collector:
  enabled: true

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["list", "watch"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["list","watch"]

  configMap:
    create: false
    existingName: "opentelemetry-collector-config"

  extraEnvs:
    - name: OPENOBSERVE_USERNAME
      valueFrom:
        secretKeyRef:
          name: openobserve-admin-credentials
          key: ZO_ROOT_USER_EMAIL
    - name: OPENOBSERVE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: openobserve-admin-credentials
          key: ZO_ROOT_USER_PASSWORD

  fullnameOverride: "opentelemetry-collector"

  image:
    repository: otel/opentelemetry-collector-contrib

  mode: deployment

  resources:
    limits:
      cpu: 100m
      memory: 200Mi
    requests:
      cpu: 50m
      memory: 100Mi

  service:
    type: ClusterIP


## -----------------------------------------------------------
## Values for OpenChoreo specific customizations and workloads
## -----------------------------------------------------------

adapter:
  enabled: true
  image:
    repository: "ghcr.io/openchoreo/observability-tracing-openobserve-adapter"
    tag: ""  # Defaults to Chart.AppVersion via the template
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
  serverPort: 9100


opentelemetryCollectorCustomizations:
  openSearchQueue:
    numConsumers: 5
    queueSize: 1000
    sizer: items

  # Used when global.installationMode is "multiClusterExporter" (dataplane) or
  # "multiClusterReceiver" (observability plane). The exporter relays OTLP to the
  # receiver collector through the observability-plane gateway.
  http:
    observabilityPlaneUrl: ""          # OTLP endpoint of the receiver, via the gateway
    observabilityPlaneVirtualHost: ""  # Host header / gateway vhost
    hostnames: []                      # hostnames placed on the receiver HTTPRoute

  tailSampling:
    enabled: true
    decisionWait: 10s
    numTraces: 100
    expectedNewTracesPerSec: 10
    decisionCache:
      sampledCacheSize: 10000
      nonSampledCacheSize: 1000
    spansPerSecond: 10
