{{- if .Values.adapter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracing-adapter-opensearch
  namespace: {{ .Release.Namespace }}
  labels:
    app: tracing-adapter-opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracing-adapter-opensearch
  template:
    metadata:
      labels:
        app: tracing-adapter-opensearch
    spec:
      securityContext:
        runAsUser: 10500
        runAsGroup: 10500
        runAsNonRoot: true
      containers:
      - name: tracing-adapter-opensearch
        image: "{{ .Values.adapter.image.repository }}:{{ .Values.adapter.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.adapter.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - name: http
          containerPort: {{ .Values.adapter.serverPort }}
        envFrom:
        - configMapRef:
            name: tracing-adapter-opensearch
        env:
        - name: OPENSEARCH_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.adapter.openSearchSecretName | default "opensearch-admin-credentials" }}
              key: username
        - name: OPENSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.adapter.openSearchSecretName | default "opensearch-admin-credentials" }}
              key: password
        resources:
          limits:
            cpu: {{ .Values.adapter.resources.limits.cpu }}
            memory: {{ .Values.adapter.resources.limits.memory }}
          requests:
            cpu: {{ .Values.adapter.resources.requests.cpu }}
            memory: {{ .Values.adapter.resources.requests.memory }}
{{- end }}
