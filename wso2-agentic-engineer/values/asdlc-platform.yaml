# WSO2 Agentic Engineer — platform values
# Copy this file, fill in every <PLACEHOLDER>, and pass it with -f when installing.
#
# Usage:
#   helm install wso2-ae oci://ghcr.io/wso2/wso2-agentic-engineer-bundle \
#     --version <VERSION> \
#     -n wso2-ae --create-namespace \
#     --timeout 600s \
#     -f asdlc-platform.yaml \
#     --set-file wso2-ae-platform.github.appPrivateKeyPem=./github-app.pem  # if using GitHub App
#
# Notes:
#   - Task signing key: auto-generated by Helm hook on first install and stored in a
#     Kubernetes Secret. Reused on helm upgrades (idempotent).
#     For production with custom key: --set-file wso2-ae-platform.taskSigning.privateKeyPem=./your-key.pem
#   - GitHub App key: optional; omit if using Personal Access Token auth
#   - Secrets: managed via ESO + OpenBao. See the "Secret Management" section below.

# ── TLS ───────────────────────────────────────────────────────────────────────
# Adds a self-signed wildcard cert and patches the OC data-plane gateway to add
# an HTTPS listener. Requires cert-manager. Set to false to skip.
tls:
  enabled: true
  gatewayNamespace: "openchoreo-data-plane"
  gatewayName: "gateway-default"
  gatewayPort: 19443
  domain: "openchoreoapis.localhost"
  secretName: "openchoreoapis-tls"

# ── OC control-plane gateway ──────────────────────────────────────────────────
# Namespace and name of the gateway that will expose the BFF and console.
ocGateway:
  namespace: "openchoreo-control-plane"
  name: "gateway-default"

# ── Thunder identity provider ─────────────────────────────────────────────────
# Reuses the Thunder instance already installed with OpenChoreo.
thunder:
  adminURL: "http://thunder-service.thunder.svc.cluster.local:8090"
  adminClientId: "openchoreo-system-app"
  adminClientSecret: "openchoreo-system-app-secret"
  ouHandle: "default"
  publicURL: "<THUNDER_PUBLIC_URL>"          # e.g. http://thunder.example.com:8080
  systemClientId: "asdlc-system-client"
  # K8s location of OC's Thunder — used by the bootstrap job to patch CORS config.
  # Override if your OC installation uses different names.
  namespace: "thunder"
  configMapName: "thunder-config-map"
  deploymentName: "thunder-deployment"

# ── Public URLs ───────────────────────────────────────────────────────────────
# bff.publicURL must be reachable from GitHub (webhook delivery) and from
# coding-agent pods running in the workflow plane.
bff:
  publicURL: "<ASDLC_API_PUBLIC_URL>"        # e.g. http://asdlc-api.example.com:8080

console:
  publicURL: "<ASDLC_CONSOLE_PUBLIC_URL>"    # e.g. http://asdlc.example.com:8080
  thunder:
    clientId: "asdlc-console-client"
    scopes: "openid profile email"

# ── GitHub integration ────────────────────────────────────────────────────────
# Non-secret fields only. Secrets (clientSecret, webhookSecret, oauthStateKey)
# are managed via OpenBao — set them in wso2-ae-platform.secrets below.
github:
  appId: "<GITHUB_APP_ID>"
  clientId: "<GITHUB_CLIENT_ID>"
  # appPrivateKeyPem: pass via --set-file wso2-ae-platform.github.appPrivateKeyPem=./github-app.pem
  appPrivateKeyPem: ""
  appSlug: "<GITHUB_APP_SLUG>"               # e.g. asdlc-platform
  repoVisibility: "private"
  committerName: "ASDLC Bot"
  committerEmail: "bot@asdlc.dev"

# ── PostgreSQL ────────────────────────────────────────────────────────────────
# Leave postgres.url empty to use the bundled StatefulSet.
# Set it to use an external database and skip the StatefulSet.
postgres:
  url: ""    # e.g. postgres://user:pass@rds-host:5432/asdlc?sslmode=require
  auth:
    database: asdlc
    username: asdlc
    password: "<POSTGRES_PASSWORD>"          # change from the default

# ── OpenBao ───────────────────────────────────────────────────────────────────
# Address of the OpenBao instance in your cluster.
# Auth is handled via Kubernetes ServiceAccount (no static token needed).
# Override openbao.authRole / serviceAccountName / serviceAccountNamespace only
# if your OpenBao uses a non-default role or service account.
openbao:
  addr: "http://openbao.openbao.svc.cluster.local:8200"
  # authRole: "openchoreo-secret-writer-role"         # default
  # serviceAccountName: "external-secrets-openbao"    # default
  # serviceAccountNamespace: "openbao"                # default

# ── Platform sub-chart overrides ──────────────────────────────────────────────
wso2-ae-platform:
  openchoreo:
    apiBaseURL: "http://openchoreo-api.openchoreo-control-plane:8080"
    apiGatewayHost: "api.openchoreo.localhost"
    # OC organisation handle — must match your OC installation (default: "default").
    # Determines the workflow namespace: workflows-<orgHandle>
    orgHandle: "default"

  idp:
    issuer: "<THUNDER_PUBLIC_URL>"
    jwksURL: "<THUNDER_PUBLIC_URL>/oauth2/jwks"
    jwksInternalURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/jwks"
    tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
    adminURL: "http://thunder-service.thunder.svc.cluster.local:8090"

  # Hostnames used by the OC gateway HTTPRoutes (must resolve to the gateway).
  # Typically the hostname portion of bff.publicURL and console.publicURL above.
  asdlcApi:
    hostname: "<ASDLC_API_HOSTNAME>"         # e.g. asdlc-api.example.com
  console:
    hostname: "<ASDLC_CONSOLE_HOSTNAME>"     # e.g. asdlc.example.com
    thunderPublicURL: "<THUNDER_PUBLIC_URL>"

  # Task JWT signing key (RS256, PKCS#8 PEM).
  # Leave empty to auto-generate on first install via Helm hook Job.
  # The key is stored in a Kubernetes Secret and reused on helm upgrades (idempotent).
  # For production with custom key: pass via --set-file wso2-ae-platform.taskSigning.privateKeyPem=./your-key.pem
  taskSigning:
    issuer: "asdlc-bff"
    audience: "git-service"
    privateKeyPem: ""

  # Smee webhook relay — set for local k3d clusters where GitHub cannot reach
  # the BFF directly. Get a channel at https://smee.io/new
  smee:
    url: ""

  # ── Secret Management ──────────────────────────────────────────────────────
  # Secrets are pushed into OpenBao by ESO PushSecret and synced back into the
  # cluster via ExternalSecret. The chart creates the ClusterSecretStore automatically.
  #
  # Each secret supports a forceDefaultOverride policy:
  #   ""  (or not set) → push only if the key is absent in OpenBao (IfNotExists)
  #                       Safe default: seeds on first install, never overwrites on upgrade.
  #   "true"           → always overwrite OpenBao with this value on every helm install/upgrade.
  #   "false"          → do not push — rely on a value already set in OpenBao manually.
  #                       Use this pattern for production: pre-seed OpenBao before helm install.
  #
  # WARNING: non-empty values here appear in Helm release history.
  # For production, set forceDefaultOverride: "false" for all secrets and seed OpenBao manually:
  #   kubectl exec -n openbao openbao-0 -- sh -c \
  #     'BAO_ADDR=http://127.0.0.1:8200 BAO_TOKEN=<token> \
  #      bao kv put secret/asdlc/platform/github/webhook-secret value="<real-value>"'
  secrets:
    thunderSystemClientSecret:
      value: "<ASDLC_SYSTEM_CLIENT_SECRET>"  # change for production
      forceDefaultOverride: ""
    serviceAuthClientSecret:
      value: "<SERVICE_AUTH_CLIENT_SECRET>"
      forceDefaultOverride: ""
    serviceAuthGitClientSecret:
      value: "<SERVICE_AUTH_GIT_CLIENT_SECRET>"
      forceDefaultOverride: ""
    serviceAuthAgentsClientSecret:
      value: "<SERVICE_AUTH_AGENTS_CLIENT_SECRET>"
      forceDefaultOverride: ""
    githubWebhookSecret:
      value: "<GITHUB_WEBHOOK_SECRET>"       # random secret registered in your GitHub App
      forceDefaultOverride: ""
    oauthStateKey:
      value: "<OAUTH_STATE_KEY_32_CHARS>"    # exactly 32 characters
      forceDefaultOverride: ""
    githubClientSecret:
      value: "<GITHUB_CLIENT_SECRET>"
      forceDefaultOverride: ""
    observerOauthClientSecret:
      value: ""
      forceDefaultOverride: ""

# ── OC extensions sub-chart overrides ────────────────────────────────────────
wso2-ae-oc-extensions:
  authz:
    apiClientId: "asdlc-api-client"
    administratorsGroup: "Administrators"
